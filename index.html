<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
  <title>Painel KloudAds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020b14;
      --foreground: #fff;
      --glass-bg: rgba(21, 101, 192, 0.35);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-blur: 10px;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--foreground);
    }

    .layout { display: flex; width: 1920px; height: 1080px; }

    .sidebar {
      width: 30%; height: 100%; display: flex; flex-direction: column;
      justify-content: flex-start; gap: 20px; background: #084279;
      padding: 40px; border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass {
      background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 20px; width: 100%;
    }

    /* --- CORREÇÃO DA LOGO --- */
    .logo-section {
      display: flex; justify-content: center; align-items: center;
      padding: 20px; min-height: 150px;
    }

    .logo-section img {
      max-height: 100px; /* Tamanho ajustado para não ficar gigante */
      max-width: 90%;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
    }

    /* Manter demais estilos originais... */
    .clock-time { font-weight: 800; font-size: 96px; text-align: center; display: block; }
    .main { width: 70%; background: linear-gradient(135deg, #0c4a8c, #082448); }
  </style>
</head>

<body>
  <div class="layout">
    <div class="sidebar">
      
      <div class="glass logo-section">
        <img id="logoImg" alt="KloudAds" src="https://raw.githubusercontent.com/kloud-ads/kloudads-painel/8ebec2414e6abaeab2cffe81c26a469e8447993e/logo-loudads.PNG">
      </div>

      <div class="glass">
        <span class="clock-time" id="clockTime">00:00</span>
        <div id="clockDate" style="text-align:center; opacity:0.7"></div>
      </div>

      <div class="glass" id="weatherCard" style="text-align:center">
          <div id="wCity">Carregando clima...</div>
          <div id="wTemp" style="font-size: 60px; font-weight: 800;">--°C</div>
      </div>

    </div>

    <div class="main">
      </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clockTime').textContent = 
        String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
