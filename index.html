<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds Painel Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            /* Fundo idêntico à imagem de estética sugerida */
            background: radial-gradient(circle at center, #1e3c72 0%, #122240 100%);
            height: 100vh;
            width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Simétrico */
        header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            height: 150px;
        }

        .header-side { width: 300px; }
        #data-topo { font-size: 24px; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; text-align: left; opacity: 0.9; }
        #hora-topo { font-size: 60px; font-weight: 900; text-align: right; line-height: 1; }

        .logo-center {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Filtro para limpar a logo e manter a parte interna branca */
        .logo-center img {
            height: 120px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Painel de Vidro Ultra-Fosco (Estética da Imagem) */
        .glass-container {
            width: 92%;
            height: 65%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .slide { display: none; width: 100%; text-align: center; animation: fadeUp 1s ease; }
        .active { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tag-main { font-size: 18px; letter-spacing: 10px; text-transform: uppercase; opacity: 0.5; margin-bottom: 30px; }
        
        /* Clima */
        .clima-content { display: flex; align-items: center; justify-content: center; gap: 40px; }
        .temp-main { font-size: 200px; font-weight: 900; letter-spacing: -5px; }
        #emoji-clima { font-size: 150px; }
        .desc-main { font-size: 40px; font-weight: 400; text-transform: capitalize; opacity: 0.8; }

        /* Loterias */
        .lot-title { font-size: 80px; font-weight: 900; margin-bottom: 10px; }
        .lot-sub { font-size: 24px; opacity: 0.6; margin-bottom: 30px; }
        .balls-row { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .ball-item {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Notícias */
        .news-layout { display: flex; align-items: center; padding: 0 80px; gap: 60px; text-align: left; }
        #img-news { width: 500px; height: 350px; border-radius: 40px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .txt-news { font-size: 45px; font-weight: 700; line-height: 1.2; flex: 1; }

    </style>
</head>
<body>

    <header>
        <div class="header-side">
            <div id="data-topo">Sábado, 04 de Abril</div>
        </div>
        <div class="logo-center">
            <img src="Logo KloudAds Atualizada.png" alt="KloudAds">
        </div>
        <div class="header-side">
            <div id="hora-topo">00:00:00</div>
        </div>
    </header>

    <div class="glass-container">
        <div class="slide active">
            <div class="tag-main">Previsão do Tempo</div>
            <div style="font-size: 35px; color:#fdbb2d; margin-bottom: 10px;">Americana - SP</div>
            <div class="clima-content">
                <div id="emoji-clima">☀️</div>
                <div class="temp-main" id="temp-val">--°</div>
            </div>
            <div class="desc-main" id="temp-desc">Carregando...</div>
        </div>

        <div class="slide">
            <div class="tag-main">Loterias Caixa</div>
            <div class="lot-title" style="color: #209869;">MEGA-SENA</div>
            <div class="lot-sub" id="meta-mega">Concurso ---</div>
            <div class="balls-row" id="balls-mega"></div>
        </div>

        <div class="slide">
            <div class="tag-main">Loterias Caixa</div>
            <div class="lot-title" style="color: #930089;">LOTOFÁCIL</div>
            <div class="lot-sub" id="meta-loto">Concurso ---</div>
            <div class="balls-row" id="balls-loto"></div>
        </div>

        <div class="slide">
            <div class="tag-main">Últimas Notícias</div>
            <div class="news-layout">
                <img id="img-news" src="">
                <div class="txt-news" id="txt-news">Buscando as notícias mais importantes...</div>
            </div>
        </div>
    </div>

    <script>
        const KEY_W = 'b0b0fbf4fb3bac7908252d23111a524d';
        const KEY_N = '572a3b63c9f2a22dcf62bd79b812308c';

        function updateClock() {
            const now = new Date();
            document.getElementById('hora-topo').innerText = now.toLocaleTimeString('pt-BR', { hour12: false });
            document.getElementById('data-topo').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);

        function getEmoji(code) {
            const map = { '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️', '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️', '09d': '🌧️', '10d': '🌦️', '11d': '⛈️', '13d': '❄️', '50d': '🌫️' };
            return map[code] || '🌡️';
        }

        async function getData() {
            try {
                // Clima
                const w = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${KEY_W}`).then(r => r.json());
                document.getElementById('temp-val').innerText = Math.round(w.main.temp) + '°';
                document.getElementById('temp-desc').innerText = w.weather[0].description;
                document.getElementById('emoji-clima').innerText = getEmoji(w.weather[0].icon);

                // Loterias
                const m = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json());
                document.getElementById('meta-mega').innerText = `Concurso ${m.concurso} • ${m.data}`;
                document.getElementById('balls-mega').innerHTML = m.dezenas.map(n => `<div class="ball-item" style="background:#209869">${n}</div>`).join('');

                const l = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json());
                document.getElementById('meta-loto').innerText = `Concurso ${l.concurso} • ${l.data}`;
                document.getElementById('balls-loto').innerHTML = l.dezenas.map(n => `<div class="ball-item" style="background:#930089; width:65px; height:65px; font-size:30px;">${n}</div>`).join('');

                // Notícias
                const n = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${KEY_N}`).then(r => r.json());
                if(n.articles.length > 0) {
                    document.getElementById('txt-news').innerText = n.articles[0].title;
                    document.getElementById('img-news').src = n.articles[0].image;
                }
            } catch(e) { console.log("Erro na rede"); }
        }

        let idx = 0;
        const slides = document.querySelectorAll('.slide');
        function rotate() {
            slides[idx].classList.remove('active');
            idx = (idx + 1) % slides.length;
            slides[idx].classList.add('active');
        }

        updateClock();
        getData();
        setInterval(rotate, 15000);
        setInterval(getData, 600000);
    </script>
</body>
</html>
