<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds - Painel Profissional V2</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #021027, #0b2545, #134074);
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); height: 100vh; width: 100vw; display: flex; color: #fff; overflow: hidden; }

        /* Coluna Esquerda 30% */
        #side-bar {
            width: 30%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 50px 20px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        #clock { font-size: 3.8rem; font-weight: 800; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .weather-info { text-align: center; width: 100%; }
        .city-name { font-size: 2rem; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
        .temp-val { font-size: 5.5rem; font-weight: bold; line-height: 1; }
        .temp-range { font-size: 1.4rem; margin-top: 10px; opacity: 0.9; font-weight: 400; }
        .logo-area { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; }

        /* Coluna Direita 70% */
        #main-content { width: 70%; height: 100%; padding: 40px; display: flex; align-items: center; justify-content: center; }
        .card { 
            width: 100%; height: 85%; background: var(--glass); border-radius: 25px; 
            padding: 40px; border: 1px solid rgba(255,255,255,0.15); display: none;
            animation: slideUp 0.6s ease-out forwards;
        }

        #news-img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; margin: 20px 0; border: 3px solid var(--glass); }
        .news-title { font-size: 2.4rem; font-weight: 700; line-height: 1.2; }

        .lotto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 30px; }
        .ball { 
            width: 70px; height: 70px; background: #9c27b0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .horoscopo-container { font-size: 2.2rem; line-height: 1.5; text-align: center; padding-top: 50px; font-style: italic; color: #ffeb3b; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside id="side-bar">
        <div id="clock">00:00:00</div>
        <div id="weather-area" class="weather-info">
            <div id="city" class="city-name">Americana</div>
            <div id="temp" class="temp-val">--°C</div>
            <div id="range" class="temp-range">min --° / max --°</div>
            <div id="desc" style="text-transform: capitalize; opacity: 0.7; margin-top: 5px;">carregando...</div>
        </div>
        <div class="logo-area">KLOUD<span style="color:var(--accent)">ADS</span></div>
    </aside>

    <main id="main-content">
        <div id="slide-1" class="card">
            <h2 style="color:var(--accent)">NOTÍCIAS REGIONAIS</h2>
            <img id="news-img" src="" style="display:none">
            <div id="news-title" class="news-title">Buscando notícias...</div>
        </div>

        <div id="slide-2" class="card">
            <h2 style="color:#ff9800">RESULTADO LOTOFÁCIL</h2>
            <div class="lotto-grid" id="lotto-numbers"></div>
        </div>

        <div id="slide-3" class="card">
            <h2 style="color:#e91e63">HORÓSCOPO DO DIA</h2>
            <div class="horoscopo-container" id="horoscopo-text">"Grandes oportunidades surgirão hoje. Mantenha o foco nos seus objetivos."</div>
        </div>
    </main>

    <script>
        // --- APIS INSERIDAS CONFORME SOLICITADO ---
        const WEATHER_KEY = 'b0b0fbf4fb3bac7908252d23111a524d';
        const GNEWS_KEY = '572a3b63c9f2a22dcf62bd79b812308c';
        
        const cidades = ["Americana", "Campinas", "Sao Paulo"];
        let step = 0;

        // Relógio HH:mm:ss
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // API Clima com correção de Min/Max
        async function getClima(cidade) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cidade},br&units=metric&lang=pt_br&appid=${WEATHER_KEY}`);
                const data = await res.json();
                
                if (data.cod === 200) {
                    document.getElementById('city').innerText = cidade;
                    document.getElementById('temp').innerText = Math.round(data.main.temp) + '°C';
                    document.getElementById('desc').innerText = data.weather[0].description;
                    
                    const min = Math.round(data.main.temp_min);
                    const max = Math.round(data.main.temp_max);
                    document.getElementById('range').innerText = `min ${min}° / max ${max}°`;
                }
            } catch (e) { console.error("Erro na API de Clima"); }
        }

        // API Notícias GNews
        async function getNoticias() {
            try {
                const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&apikey=${GNEWS_KEY}`);
                const data = await res.json();
                if(data.articles && data.articles.length > 0) {
                    const noticia = data.articles[0];
                    document.getElementById('news-title').innerText = noticia.title;
                    if(noticia.image) {
                        document.getElementById('news-img').src = noticia.image;
                        document.getElementById('news-img').style.display = 'block';
                    }
                }
            } catch (e) { document.getElementById('news-title').innerText = "Erro ao carregar notícias."; }
        }

        // Dados Loterias (Simulado - Para API Real da Caixa, o desenvolvedor deve integrar endpoint específico)
        function setLoteria() {
            const grid = document.getElementById('lotto-numbers');
            grid.innerHTML = '';
            const numeros = ["02","05","07","08","10","12","13","15","17","18","20","21","22","24","25"];
            numeros.forEach(n => grid.innerHTML += `<div class="ball">${n}</div>`);
        }

        // Transição Sincronizada a cada 5 segundos
        function rotate() {
            const slides = [document.getElementById('slide-1'), document.getElementById('slide-2'), document.getElementById('slide-3')];
            slides.forEach(s => s.style.display = 'none');
            
            slides[step].style.display = 'block';
            getClima(cidades[step]);

            if(step === 0) getNoticias();
            if(step === 1) setLoteria();

            step = (step + 1) % 3;
        }

        rotate();
        setInterval(rotate, 5000);
    </script>
</body>
</html>
