<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
  <title>Painel KloudAds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #020b14;
      --sidebar-navy: #001a33;
      --foreground: #fff;
      --glass-bg: rgba(21, 101, 192, 0.35);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-blur: 10px;
      --header-bar-blue: #0a3d7a;
      --color-gold: #ffd700;
      --mega-green: #209869;
      --lotto-magenta: #c71585;
      --lotto-gold-brown: #8b7500;
      --quina-blue: #260085;
      --quina-blue-light: #3f51b5;
      --lottery-ball-purple: #6d28d9;
      --lottery-ball-purple-mid: #5b21b6;
      --lottery-col-bg: rgba(0, 15, 40, 0.58);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      color: var(--foreground);
      cursor: none;
      user-select: none;
      -webkit-font-smoothing: antialiased
    }

    .layout {
      display: flex;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
    }

    .sidebar {
      width: 30%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      background: #084279;
      backdrop-filter: blur(12px);
      padding: 40px;
      border-right: 1px solid rgba(255, 255, 255, 0.08)
    }

    .sidebar > .glass {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      border-radius: 20px;
      padding: 20px 24px;
      width: 100%
    }

    .main {
      width: 70%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(135deg, #0c4a8c, #1565c0, #082448);
      padding: 36px 40px 36px 32px;
      position: relative
    }

    .clock-time {
      font-weight: 800;
      font-size: 96px;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.25)
    }

    .clock-period {
      font-size: 32px;
      font-weight: 600;
      opacity: 0.9;
      vertical-align: super;
      margin-left: 6px
    }

    .clock-date {
      font-size: 18px;
      opacity: 0.75;
      margin-top: 12px;
      letter-spacing: 0.5px
    }

    .weather-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .weather-city {
      font-size: 22px;
      font-weight: 500;
      text-align: center
    }

    .weather-temp {
      font-size: 96px;
      font-weight: 800;
      line-height: 1
    }

    .weather-unit {
      font-size: 32px;
      font-weight: 400;
      opacity: 0.85
    }

    .weather-minmax {
      font-size: 17px;
      opacity: 0.7;
      margin-bottom: 8px
    }

    .weather-minmax strong {
      opacity: 1;
      font-weight: 600
    }

    .weather-desc {
      font-size: 16px;
      opacity: 0.78;
      font-style: italic
    }

    .logo-section {
      text-align: center
    }

    .logo-section img {
      max-height: 340px;
      max-width: 95%;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.35));
      margin-bottom: -4px
    }

    .logo-section p {
      opacity: 0.6;
      font-size: 20px;
      letter-spacing: 0.5px
    }

    .slide-area {
      flex: 1;
      position: relative;
      z-index: 1
    }

    .slide {
      display: none;
      height: 100%;
      flex-direction: column
    }

    .slide.active {
      display: flex
    }

    .slide-header {
      background: linear-gradient(90deg, var(--header-bar-blue), #0d5299);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      border-radius: 16px;
      text-align: center;
      padding: 20px 28px;
      margin-bottom: 28px
    }

    .slide-header h2 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0
    }

    .slide-header .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 8px 16px;
      border-radius: 20px;
      margin-top: 8px
    }

    .indicators {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 16px
    }

    .indicator {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.4s
    }

    .indicator.active {
      opacity: 1;
      font-weight: 800
    }

    .indicator:not(.active) {
      opacity: 0.45
    }

    .indicator .dot {
      height: 6px;
      border-radius: 9999px;
      transition: all 0.4s
    }

    .indicator.active .dot {
      width: 20px
    }

    .indicator:not(.active) .dot {
      width: 6px
    }

    /* News */
    .news-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px
    }

    .news-featured {
      grid-column: span 2;
      border-radius: 20px;
      overflow: hidden;
      position: relative
    }

    .news-featured::before,
    .news-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.85), rgba(255, 255, 255, 0.35));
      border-radius: 3px 0 0 3px
    }

    .news-featured-inner {
      display: grid;
      grid-template-columns: minmax(280px, 50%) 1fr;
      max-height: 480px
    }

    .news-featured-img {
      position: relative;
      background: linear-gradient(135deg, rgba(21, 101, 192, 0.5), rgba(30, 58, 95, 0.8))
    }

    .news-featured-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .news-featured-content {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px
    }

    .news-cat {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.88
    }

    .news-title-gold {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--color-gold);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.35)
    }

    .news-title {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.35;
      flex: 1
    }

    .news-bullets {
      list-style: none;
      margin-top: 12px
    }

    .news-bullets li {
      font-size: 16px;
      line-height: 1.45;
      padding: 4px 0 4px 22px;
      position: relative;
      opacity: 0.95;
    }

    .news-bullets li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-gold);
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.45)
    }

    .news-source {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .news-source::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-gold)
    }

    .news-card {
      border-radius: 20px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden
    }

    /* Lottery */
    .mega-bar {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 28px
    }

    .mega-bar-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 22px;
      padding: 18px 24px;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px)
    }

    .mega-badge {
      display: inline-flex;
      align-items: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 11px 24px;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: var(--mega-green);
      box-shadow: 0 4px 16px rgba(32, 152, 105, 0.45);
      flex-shrink: 0
    }

    .mega-nums {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 220px
    }

    .mega-nums .info {
      font-size: 13px;
      font-weight: 700;
      opacity: 0.9;
      letter-spacing: 0.5px
    }

    .mega-nums .prize {
      font-size: 13px;
      opacity: 0.88;
      margin-left: auto
    }

    .mega-nums .prize strong {
      color: var(--color-gold);
      font-weight: 800
    }
   
    @keyframes luzAcumulada {
      0% { text-shadow: 0 0 5px rgba(255,215,0,0.5), 0 0 10px rgba(255,215,0,0.2); }
      100% { text-shadow: 0 0 15px rgba(255,215,0,1), 0 0 25px rgba(255,215,0,0.8), 0 0 35px rgba(255,215,0,0.6); }
    }
    .acumulou {
      color: #fffb00 !important;
      animation: luzAcumulada 1.5s infinite alternate;
    }

    .mega-bar-bottom {
      text-align: center;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      padding: 14px 20px;
      background: linear-gradient(90deg, #0a5c3a, var(--mega-green), #0a5c3a)
    }

    .lotto-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "mega quina"
        "loto loto";
      gap: 28px;
      align-items: stretch
    }

    .lotto-col {
      border-radius: 20px;
      text-align: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: var(--lottery-col-bg);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
      padding-bottom: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .lotto-col.mega { grid-area: mega; }
    .lotto-col.quina { grid-area: quina; }
    .lotto-col.loto { grid-area: loto; }

    .lotto-badge {
      align-self: center;
      display: inline-block;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 3px;
      padding: 10px 28px;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      margin: 22px 0 18px
    }

    .lotto-badge.magenta {
      background: var(--lotto-magenta)
    }

    .lotto-badge.gold {
      background: linear-gradient(to bottom, #a67c00, var(--lotto-gold-brown))
    }

    .lotto-badge.blue {
      background: linear-gradient(to bottom, var(--quina-blue-light), var(--quina-blue))
    }

    .lotto-concurso {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 20px
    }

    .ball-grid {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 24px;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px;
      flex: 1;
    }

    .ball-grid.cols5 {
      grid-template-columns: repeat(5, 1fr)
    }

    .ball {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      position: relative
    }

    .ball::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 12px;
      width: 18px;
      height: 10px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 50%;
      transform: rotate(-25deg)
    }

    .ball-mega {
      width: 52px;
      height: 52px;
      font-size: 22px;
      background: linear-gradient(145deg, #2ecc71, var(--mega-green));
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35)
    }

    .ball-purple {
      width: 56px;
      height: 56px;
      font-size: 24px;
      background: linear-gradient(145deg, var(--lottery-ball-purple), var(--lottery-ball-purple-mid));
      border: 2px solid rgba(255, 255, 255, 0.28)
    }

    .ball-purple.sm {
      width: 36px;
      height: 36px;
      font-size: 14px
    }

    .ball-blue {
      width: 56px;
      height: 56px;
      font-size: 24px;
      background: linear-gradient(145deg, var(--quina-blue-light), var(--quina-blue));
      border: 2px solid rgba(255, 255, 255, 0.28)
    }

    .lotto-prize {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.78
    }

    .lotto-prize strong {
      font-size: 17px;
      font-weight: 800
    }

    .lotto-prize strong.pink {
      color: #ffb4c8
    }

    .lotto-prize strong.gold {
      color: var(--color-gold)
    }

    .lotto-prize strong.blue {
      color: #90caf9
    }

    /* Horoscope */
    .horo-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 16px;
      align-items: stretch
    }

    .horo-card {
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden
    }

    .horo-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px
    }

    .horo-symbol {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0
    }

    .horo-sign {
      font-size: 18px;
      font-weight: 800;
      color: var(--color-gold);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.35)
    }

    .horo-dates {
      font-size: 12px;
      opacity: 0.55;
      margin-top: 2px
    }

    .horo-msg {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.45;
      flex: 1
    }

    .horo-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px
    }

    .horo-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.22);
      opacity: 0.88
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fade-in {
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0
    }
  </style>
</head>

  <script>
    // ========== RESPONSIVIDADE (ESCALA INTELIGENTE PARA 4K / SMART TVS) ==========
    function scaleLayout() {
      const el = document.querySelector('.layout');
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      el.style.transform = `scale(${scale})`;
      el.style.marginLeft = `${(window.innerWidth - (1920 * scale)) / 2}px`;
      el.style.marginTop = `${(window.innerHeight - (1080 * scale)) / 2}px`;
    }
    window.addEventListener('resize', scaleLayout);
    scaleLayout();

    // ========== FERRAMENTAS UTILITÃRIAS ==========
    const IS_LOCAL = false; // Permitindo que o arquivo faÃ§a fetch() livremente (as APIs suportadas tem allow-origin)
    function lsGet(k) { try { return JSON.parse(localStorage.getItem('kloudads_' + k)); } catch { return null; } }
    function lsSet(k, v) { try { localStorage.setItem('kloudads_' + k, JSON.stringify(v)); } catch { } }

    // ========== MÃ“DULO DE RELÃ“GIO ==========

    const DAYS = ['Domingo', 'Segunda-feira', 'TerÃ§a-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'SÃ¡bado'];
    function updateClock() {
      const n = new Date(), h = n.getHours().toString().padStart(2, '0'), m = n.getMinutes().toString().padStart(2, '0');
      document.getElementById('clockTime').textContent = h + ':' + m;
      document.getElementById('clockDate').textContent = DAYS[n.getDay()] + ', ' + n.getDate().toString().padStart(2, '0') + ' de ' + MONTHS[n.getMonth()] + ' de ' + n.getFullYear();
     
      // Auto-Reload da Madrugada (04:00:00) para limpar cache/memÃ³ria do navegador da TV
      if (n.getHours() === 4 && n.getMinutes() === 0 && n.getSeconds() === 0) {
        window.location.reload(true);
      }
    }
    updateClock(); setInterval(updateClock, 1000);

    const CITIES = [
      { name: 'Campinas, SP', temp: 26, min: 20, max: 29, desc: 'CÃ©u limpo com poucas nuvens', icon: 'â˜€ï¸' },
      { name: 'Americana, SP', temp: 28, min: 22, max: 31, desc: 'Sol com nuvens esparsas', icon: 'â›…' },
