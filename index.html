<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
  <title>Painel KloudAds</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* (SEU CSS ORIGINAL MANTIDO - NÃO ALTERADO) */
  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- RELÓGIO -->
    <div class="glass" style="text-align:center">
      <div><span class="clock-time" id="clockTime">00:00</span></div>
      <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- CLIMA -->
    <div class="glass" style="text-align:center">
      <div class="weather-city" id="wCity">Carregando...</div>
      <div>
        <span class="weather-temp" id="wTemp">--</span>
        <span class="weather-unit">°C</span>
      </div>
      <div class="weather-minmax">
        mín: <strong id="wMin">--</strong>° / máx: <strong id="wMax">--</strong>°
      </div>
      <div class="weather-desc" id="wDesc"></div>
    </div>

    <!-- LOGO -->
    <div class="glass logo-section">
      <img id="logoImg"
        src="https://raw.githubusercontent.com/kloud-ads/kloudads-painel/8ebec2414e6abaeab2cffe81c26a469e8447993e/logo-kloudads.PNG"
        alt="KloudAds">
      <p>www.KloudAds.com.br</p>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- NOTÍCIAS -->
    <div class="slide active">
      <h2>Notícias da Região</h2>
    </div>

    <!-- LOTERIA -->
    <div class="slide">
      <h2>Loterias Caixa</h2>
    </div>

    <!-- HORÓSCOPO -->
    <div class="slide">
      <h2>Horóscopo do Dia</h2>
    </div>

  </div>

</div>

<script>

  /* ===== RELÓGIO ===== */
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

  function updateClock() {
    const now = new Date();

    document.getElementById('clockTime').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');

    document.getElementById('clockDate').textContent =
      DAYS[now.getDay()] + ', ' +
      now.getDate() + ' de ' +
      MONTHS[now.getMonth()] + ' de ' +
      now.getFullYear();
  }

  setInterval(updateClock, 1000);
  updateClock();

  /* ===== HORÓSCOPO (CORRIGIDO ACENTOS) ===== */
  const ZODIAC = [
    { sign: 'Áries' },
    { sign: 'Touro' },
    { sign: 'Gêmeos' },
    { sign: 'Câncer' },
    { sign: 'Leão' },
    { sign: 'Virgem' },
    { sign: 'Libra' },
    { sign: 'Escorpião' },
    { sign: 'Sagitário' },
    { sign: 'Capricórnio' },
    { sign: 'Aquário' },
    { sign: 'Peixes' }
  ];

</script>

</body>
</html>
