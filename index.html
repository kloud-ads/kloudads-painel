<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KloudAds Premium</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  overflow: hidden;
  font-family: Arial;
  color: #d4af37;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.tela {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: all 1s ease;
  text-align: center;
}

.ativa {
  top: 0;
}

.saindo {
  top: 100%;
}

h1 {
  font-size: 60px;
  margin-bottom: 20px;
}

p {
  font-size: 30px;
  color: white;
  max-width: 80%;
}
</style>
</head>

<body>

<div class="container">

<div class="tela ativa">
  <h1>Clima</h1>
  <p>☀️ Americana - 25°C</p>
</div>

<div class="tela">
  <h1>Hora</h1>
  <p id="hora"></p>
</div>

<div class="tela">
  <h1>Notícias</h1>
  <p>Campinas e região seguem em crescimento econômico</p>
</div>

<div class="tela">
  <h1>Esportes</h1>
  <p>Últimos resultados do futebol brasileiro</p>
</div>

<div class="tela">
  <h1>Loterias</h1>
  <p>Mega-Sena: 12 - 23 - 34 - 45 - 56 - 60</p>
</div>

<div class="tela">
  <h1>Horóscopo</h1>
  <p>Hoje é um dia de oportunidades e decisões importantes</p>
</div>

</div>

<script>
let telas = document.querySelectorAll('.tela');
let atual = 0;

function trocarTela() {
  telas[atual].classList.remove('ativa');
  telas[atual].classList.add('saindo');

  atual = (atual + 1) % telas.length;

  telas[atual].classList.add('ativa');

  setTimeout(() => {
    document.querySelectorAll('.tela').forEach(t => {
      if (!t.classList.contains('ativa')) {
        t.classList.remove('saindo');
        t.style.top = "100%";
      }
    });
  }, 1000);
}

setInterval(trocarTela, 5000);

// Hora em tempo real
function atualizarHora() {
  const agora = new Date();
  document.getElementById("hora").innerText =
    agora.toLocaleTimeString();
}

setInterval(atualizarHora, 1000);
</script>

</body>
</html>
