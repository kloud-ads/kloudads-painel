<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle, #1e3c72 0%, #122240 100%);
            height: 100vh;
            width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centraliza tudo verticalmente */
            overflow: hidden;
        }

        /* Relógio no Topo */
        #topo {
            position: absolute;
            top: 60px;
            text-align: center;
        }
        #relogio { font-size: 120px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        #data { font-size: 35px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }

        /* Painel de Vidro Central */
        .painel-vidro {
            width: 85%;
            height: 55%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            margin-top: 140px; /* Compensa a altura do relógio */
        }

        .slide { display: none; text-align: center; animation: surge 0.5s ease-out forwards; width: 100%; }
        .active { display: block; }

        @keyframes surge { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Estilo Clima */
        .cidade { font-size: 40px; color: #fdbb2d; text-transform: uppercase; margin-bottom: 10px; }
        .temperatura { font-size: 200px; font-weight: 900; line-height: 1; }
        .condicao { font-size: 40px; text-transform: capitalize; opacity: 0.9; }

        /* Estilo Loterias */
        .lot-nome { font-size: 70px; font-weight: 900; margin-bottom: 20px; }
        .dezenas { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .bola {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Estilo Notícias */
        .news-grid { display: flex; align-items: center; padding: 0 80px; gap: 50px; text-align: left; }
        #n-img { width: 450px; height: 350px; border-radius: 40px; object-fit: cover; border: 4px solid rgba(255,255,255,0.2); }
        .n-titulo { font-size: 45px; font-weight: 700; line-height: 1.2; }

        .tag { font-size: 22px; letter-spacing: 8px; opacity: 0.5; text-transform: uppercase; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="topo">
        <div id="relogio">00:00:00</div>
        <div id="data">---</div>
    </div>

    <div class="painel-vidro">
        <div class="slide active">
            <div class="tag">Previsão do Tempo</div>
            <div class="cidade">Americana - SP</div>
            <div class="temperatura" id="temp-v">--°</div>
            <div class="condicao" id="cond-v">Carregando...</div>
        </div>

        <div class="slide">
            <div class="tag">Loterias Caixa</div>
            <div class="lot-nome" style="color: #209869;">MEGA-SENA</div>
            <div class="dezenas" id="mega-d"></div>
        </div>

        <div class="slide">
            <div class="tag">Loterias Caixa</div>
            <div class="lot-nome" style="color: #930089;">LOTOFÁCIL</div>
            <div class="dezenas" id="loto-d"></div>
        </div>

        <div class="slide">
            <div class="tag">GNews • Notícias</div>
            <div class="news-grid">
                <img id="n-img" src="">
                <div class="n-titulo" id="n-txt">Buscando informações...</div>
            </div>
        </div>
    </div>

    <script>
        const API_W = 'b0b0fbf4fb3bac7908252d23111a524d';
        const API_N = '572a3b63c9f2a22dcf62bd79b812308c';

        function updateTime() {
            const d = new Date();
            document.getElementById('relogio').innerText = d.toLocaleTimeString('pt-BR');
            document.getElementById('data').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000);

        async function loadData() {
            try {
                // Clima
                const w = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_W}`).then(r => r.json());
                document.getElementById('temp-v').innerText = Math.round(w.main.temp) + '°';
                document.getElementById('cond-v').innerText = w.weather[0].description;

                // Loterias
                const m = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json());
                document.getElementById('mega-d').innerHTML = m.dezenas.map(n => `<div class="bola" style="background:#209869">${n}</div>`).join('');
                
                const l = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json());
                document.getElementById('loto-d').innerHTML = l.dezenas.map(n => `<div class="bola" style="background:#930089; width:70px; height:70px; font-size:30px;">${n}</div>`).join('');

                // Notícias
                const n = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_N}`).then(r => r.json());
                if(n.articles.length > 0) {
                    document.getElementById('n-txt').innerText = n.articles[0].title;
                    document.getElementById('n-img').src = n.articles[0].image;
                }
            } catch(e) { console.log("Erro na carga"); }
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function rotate() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }

        loadData();
        updateTime();
        setInterval(rotate, 15000); // 15 seg cada tela
        setInterval(loadData, 600000); // Recarrega APIs a cada 10 min
    </script>
</body>
</html>
