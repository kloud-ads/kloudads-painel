<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Americana - KloudAds</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; } /* Esconde o mouse */
        
        body {
            background: radial-gradient(circle, #1a2a6c 0%, #122240 100%);
            height: 100vh;
            width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Relógio Centralizado no Topo */
        #topo {
            position: absolute;
            top: 50px;
            text-align: center;
            width: 100%;
        }
        #relogio { font-size: 130px; font-weight: 900; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #data { font-size: 35px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; letter-spacing: 2px; }

        /* Painel de Vidro (Layout Centralizado) */
        .painel-vidro {
            width: 85%;
            height: 60%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            margin-top: 120px;
        }

        .slide { display: none; width: 100%; text-align: center; animation: fadeIn 0.8s ease-out forwards; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Clima sem a bola marrom */
        .cidade { font-size: 45px; color: #fdbb2d; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 5px; }
        .temperatura { font-size: 220px; font-weight: 900; line-height: 1; }
        .condicao { font-size: 45px; text-transform: capitalize; opacity: 0.9; margin-top: 10px; }

        /* Loterias */
        .lot-nome { font-size: 80px; font-weight: 900; margin-bottom: 25px; }
        .dezenas { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .bola {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* Notícias */
        .news-grid { display: flex; align-items: center; padding: 0 100px; gap: 60px; text-align: left; }
        #n-img { width: 500px; height: 350px; border-radius: 40px; object-fit: cover; border: 5px solid rgba(255,255,255,0.2); }
        .n-titulo { font-size: 45px; font-weight: 700; line-height: 1.3; }

        .tag { font-size: 25px; letter-spacing: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="topo">
        <div id="relogio">00:00:00</div>
        <div id="data">---</div>
    </div>

    <div class="painel-vidro">
        <div class="slide active">
            <div class="tag">Previsão do Tempo</div>
            <div class="cidade">Americana - SP</div>
            <div class="temperatura" id="temp-v">--°C</div>
            <div class="condicao" id="cond-v">Carregando...</div>
        </div>

        <div class="slide">
            <div class="tag">Loterias Caixa</div>
            <div class="lot-nome" style="color: #209869;">MEGA-SENA</div>
            <div class="dezenas" id="mega-d"></div>
        </div>

        <div class="slide">
            <div class="tag">Loterias Caixa</div>
            <div class="lot-nome" style="color: #930089;">LOTOFÁCIL</div>
            <div class="dezenas" id="loto-d"></div>
        </div>

        <div class="slide">
            <div class="tag">Últimas Notícias • GNews</div>
            <div class="news-grid">
                <img id="n-img" src="https://via.placeholder.com/500x350?text=KloudAds">
                <div class="n-titulo" id="n-txt">Sincronizando manchetes do dia...</div>
            </div>
        </div>
    </div>

    <script>
        // SUAS CHAVES DE API CONFIGURADAS
        const API_WEATHER = 'b0b0fbf4fb3bac7908252d23111a524d';
        const API_GNEWS = '572a3b63c9f2a22dcf62bd79b812308c';

        function updateClock() {
            const d = new Date();
            document.getElementById('relogio').innerText = d.toLocaleTimeString('pt-BR');
            document.getElementById('data').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);

        async function fetchData() {
            try {
                // CLIMA AMERICANA
                const wRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_WEATHER}`);
                const wData = await wRes.json();
                document.getElementById('temp-v').innerText = Math.round(wData.main.temp) + '°C';
                document.getElementById('cond-v').innerText = wData.weather[0].description;

                // MEGA-SENA
                const mRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest');
                const mData = await mRes.json();
                document.getElementById('mega-d').innerHTML = mData.dezenas.map(n => `<div class="bola" style="background:#209869">${n}</div>`).join('');
                
                // LOTOFÁCIL
                const lRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest');
                const lData = await lRes.json();
                document.getElementById('loto-d').innerHTML = lData.dezenas.map(n => `<div class="bola" style="background:#930089; width:80px; height:80px; font-size:35px;">${n}</div>`).join('');

                // GNEWS
                const nRes = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_GNEWS}`);
                const nData = await nRes.json();
                if(nData.articles.length > 0) {
                    document.getElementById('n-txt').innerText = nData.articles[0].title;
                    document.getElementById('n-img').src = nData.articles[0].image;
                }
            } catch(e) { console.error("Erro ao buscar dados das APIs"); }
        }

        let slideIdx = 0;
        const slides = document.querySelectorAll('.slide');
        function rotate() {
            slides[slideIdx].classList.remove('active');
            slideIdx = (slideIdx + 1) % slides.length;
            slides[slideIdx].classList.add('active');
        }

        fetchData();
        updateClock();
        setInterval(rotate, 15000); // 15 segundos cada tela
        setInterval(fetchData, 900000); // Atualiza APIs a cada 15 min
    </script>
</body>
</html>
