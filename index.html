<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
    <title>Painel KloudAds Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #020b14;
            --sidebar-navy: #001a33;
            --foreground: #fff;
            --glass-bg: rgba(21,101,192,0.35);
            --glass-border: rgba(255,255,255,0.2);
            --header-bar-blue: #0a3d7a;
            --color-gold: #ffd700;
            --mega-green: #209869;
            --lotto-magenta: #c71585;
        }

        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Inter', sans-serif; 
            color: var(--foreground); cursor: none; user-select: none; 
        }

        .layout { display: flex; width: 100%; height: 100%; }

        /* Lado Esquerdo 30% */
        .sidebar {
            width: 30%; height: 100%; display: flex; flex-direction: column;
            background: var(--sidebar-navy); border-right: 1px solid rgba(255,255,255,0.1);
            padding: 40px; justify-content: space-between;
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 25px; text-align: center;
        }

        .clock-time { font-weight: 800; font-size: 80px; letter-spacing: -2px; }
        .weather-city { font-size: 24px; font-weight: 600; color: var(--color-gold); margin-bottom: 10px; }
        .weather-temp { font-size: 90px; font-weight: 800; }
        .weather-minmax { font-size: 18px; opacity: 0.8; margin-top: 10px; }

        /* Lado Direito 70% */
        .main {
            width: 70%; height: 100%; 
            background: linear-gradient(135deg, #0c4a8c, #082448);
            padding: 40px; position: relative;
        }

        .slide { display: none; height: 100%; flex-direction: column; animation: fadeIn 0.8s ease; }
        .slide.active { display: flex; }

        .slide-header {
            background: var(--header-bar-blue); border-radius: 15px;
            padding: 15px; margin-bottom: 30px; text-align: center;
            text-transform: uppercase; letter-spacing: 4px; font-weight: 800;
        }

        /* News Layout */
        .news-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        #news-img { width: 100%; height: 450px; object-fit: cover; border-radius: 20px; border: 4px solid var(--glass-border); }
        .news-title { font-size: 32px; font-weight: 800; color: var(--color-gold); line-height: 1.2; }

        /* Lottery Layout */
        .lotto-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .lotto-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 30px; border: 1px solid var(--glass-border); }
        .ball-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; justify-content: center; }
        .ball {
            width: 60px; height: 60px; border-radius: 50%; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ball.mega { background: var(--mega-green); color: white; }
        .ball.facil { background: var(--lotto-magenta); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="glass">
            <div class="clock-time" id="clockTime">00:00</div>
            <div id="clockDate" style="opacity: 0.7;">--/--/----</div>
        </div>

        <div class="glass">
            <div class="weather-city" id="wCity">Americana</div>
            <div class="weather-temp" id="wTemp">--°C</div>
            <div class="weather-minmax">min <span id="wMin">--</span>° / max <span id="wMax">--</span>°</div>
            <div id="wDesc" style="text-transform: capitalize; margin-top: 10px;">Carregando...</div>
        </div>

        <div style="text-align: center; font-weight: 800; letter-spacing: 5px; opacity: 0.5;">
            KLOUD<span style="color:var(--color-gold)">ADS</span>
        </div>
    </div>

    <main class="main">
        <div id="slide-news" class="slide active">
            <div class="slide-header">Notícias do Dia</div>
            <div class="news-content">
                <img id="news-img" src="https://via.placeholder.com/1200x500?text=Carregando+Noticias..." alt="Noticia">
                <div id="news-title" class="news-title">Buscando as últimas informações...</div>
            </div>
        </div>

        <div id="slide-lotto" class="slide">
            <div class="slide-header">Resultados Loterias</div>
            <div class="lotto-container">
                <div class="lotto-card">
                    <h3 style="color:var(--mega-green)">MEGA-SENA - Concurso <span id="mega-concurso">--</span></h3>
                    <div class="ball-grid" id="mega-balls"></div>
                </div>
                <div class="lotto-card">
                    <h3 style="color:var(--lotto-magenta)">LOTOFÁCIL - Concurso <span id="facil-concurso">--</span></h3>
                    <div class="ball-grid" id="facil-balls"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const WEATHER_KEY = 'b0b0fbf4fb3bac7908252d23111a524d';
    const GNEWS_KEY = '572a3b63c9f2a22dcf62bd79b812308c';
    const CIDADES = ["Americana", "Campinas", "Sao Paulo"];
    let cityIndex = 0;

    // Relógio
    function updateClock() {
        const now = new Date();
        document.getElementById('clockTime').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('clockDate').innerText = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'});
    }
    setInterval(updateClock, 1000);

    // Clima
    async function getClima() {
        const cidade = CIDADES[cityIndex];
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cidade},br&units=metric&lang=pt_br&appid=${WEATHER_KEY}`);
            const data = await res.json();
            document.getElementById('wCity').innerText = cidade;
            document.getElementById('wTemp').innerText = Math.round(data.main.temp) + '°C';
            document.getElementById('wMin').innerText = Math.round(data.main.temp_min);
            document.getElementById('wMax').innerText = Math.round(data.main.temp_max);
            document.getElementById('wDesc').innerText = data.weather[0].description;
        } catch (e) { console.error("Erro Clima"); }
        cityIndex = (cityIndex + 1) % CIDADES.length;
    }

    // Notícias
    async function getNoticias() {
        try {
            const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&apikey=${GNEWS_KEY}`);
            const data = await res.json();
            if(data.articles && data.articles.length > 0) {
                const n = data.articles[0];
                document.getElementById('news-title').innerText = n.title;
                // Fallback: se não tiver imagem, usa uma neutra
                document.getElementById('news-img').src = n.image || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1200';
            }
        } catch (e) { console.error("Erro Notícias"); }
    }

    // Loterias (API Real e Automática)
    async function getLoterias() {
        try {
            // Mega-Sena
            const resMega = await fetch('https://brasilapi.com.br/api/loterias/mega-sena/latest');
            const dataMega = await resMega.json();
            document.getElementById('mega-concurso').innerText = dataMega.concurso;
            const megaGrid = document.getElementById('mega-balls');
            megaGrid.innerHTML = '';
            dataMega.dezenas.forEach(n => megaGrid.innerHTML += `<div class="ball mega">${n}</div>`);

            // Lotofácil
            const resFacil = await fetch('https://brasilapi.com.br/api/loterias/lotofacil/latest');
            const dataFacil = await resFacil.json();
            document.getElementById('facil-concurso').innerText = dataFacil.concurso;
            const facilGrid = document.getElementById('facil-balls');
            facilGrid.innerHTML = '';
            dataFacil.dezenas.forEach(n => facilGrid.innerHTML += `<div class="ball facil">${n}</div>`);
        } catch (e) { console.error("Erro Loterias"); }
    }

    // Alternância de Slides (Carrossel)
    let slideIndex = 0;
    function rotateSlides() {
        const slides = [document.getElementById('slide-news'), document.getElementById('slide-lotto')];
        slides.forEach(s => s.classList.remove('active'));
        
        slideIndex = (slideIndex + 1) % slides.length;
        slides[slideIndex].classList.add('active');

        // Atualiza dados conforme o slide
        getClima();
        if(slideIndex === 0) getNoticias();
        if(slideIndex === 1) getLoterias();
    }

    // Início
    updateClock();
    getClima();
    getNoticias();
    getLoterias();
    setInterval(rotateSlides, 10000); // Troca a cada 10 segundos
</script>

</body>
</html>
