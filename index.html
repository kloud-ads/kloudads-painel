<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KloudAds Cinema Display 32"</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #020617;
      --accent: #FFD700;
      --text: #f8fafc;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.15);
      --sidebar-width: 420px;
      --mega: #209869;
      --quina: #260085;
      --loto: #941156;
      --bg-blue: #003366;
      --bg-gradient: radial-gradient(circle at 10% 10%, #00509e 0%, #003366 45%),
                      radial-gradient(circle at 90% 90%, #004080 0%, #003366 45%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; }

    body, html {
      width: 100vw; height: 100vh; 
      overflow: hidden !important; 
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-blue); color: var(--text);
    }

    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-gradient);
      z-index: -1;
    }

    .app-container {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      width: 100%; height: 100%;
    }

    .sidebar {
      background: rgba(0, 30, 60, 0.6);
      backdrop-filter: blur(30px);
      padding: 40px 30px; 
      display: flex; flex-direction: column;
      border-right: 2px solid var(--glass-border);
      justify-content: space-between;
      height: 100vh;
    }

    .clock-section { text-align: center; flex-shrink: 0; }
    .clock {
      font-size: 110px; font-weight: 800; line-height: 0.9;
      letter-spacing: -5px; color: var(--accent);
      text-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }

    .date {
      font-size: 16px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-top: 15px; 
      color: #fff; 
      opacity: 0.9; 
      font-weight: 600;
      white-space: nowrap; 
      display: block;
      width: 100%;
    }

    .weather-card {
      background: var(--glass);
      border-radius: 40px; 
      padding: 30px 20px; 
      margin: 20px 0; 
      text-align: center;
      border: 1px solid var(--glass-border) !important;
      flex-shrink: 0;
    }

    .w-icon-main { font-size: 90px; margin-bottom: 5px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
    .temp-main { font-size: 75px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
    .w-desc { font-size: 20px; opacity: 0.9; text-transform: capitalize; font-weight: 500; }

    .logo-area { text-align: center; padding-bottom: 10px; flex-shrink: 0; }
    .logo-area img { width: 100%; max-width: 280px; }
    .site-url { font-size: 13px; letter-spacing: 3px; opacity: 0.6; margin-top: 15px; }

    .main-area { position: relative; padding: 50px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .slide {
      position: absolute; inset: 50px;
      opacity: 0; transform: translateY(20px);
      transition: all 1s ease-in-out;
      visibility: hidden;
      display: flex; flex-direction: column;
    }

    .slide.active { opacity: 1; transform: translateY(0); visibility: visible; }

    .slide-title {
      font-size: 44px; font-weight: 800; margin-bottom: 35px;
      display: flex; align-items: center; gap: 25px; flex-shrink: 0;
    }
    .slide-title::after {
      content: ''; height: 4px; flex: 1;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 2px;
    }

    .news-wrapper { display: grid; grid-template-columns: 1.5fr 1fr; grid-template-rows: 1fr 1fr; gap: 30px; flex: 1; overflow: hidden; margin-bottom: 50px; }
    .news-featured { grid-row: 1 / 3; position: relative; border-radius: 50px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.6); background: #004080; }
    .news-featured img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }
    .news-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 80px 50px 50px; background: linear-gradient(transparent, rgba(0,30,60,0.98)); }
    .news-overlay h3 { font-size: 44px; line-height: 1.1; margin-bottom: 15px; color: var(--accent); }
    .news-overlay p { font-size: 21px; opacity: 0.95; line-height: 1.5; }
    
    .news-secondary { display: grid; grid-template-rows: repeat(3, 1fr); gap: 20px; }
    
    .news-item { 
        background: var(--glass); 
        border-radius: 25px; 
        padding: 25px 30px; 
        border: 1px solid var(--glass-border) !important; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: flex-start;
    }
    .news-item h4 { font-size: 23px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
    .news-item p { font-size: 16px; opacity: 0.7; line-height: 1.4; font-weight: 400; }

    .lotto-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex: 1; margin-bottom: 50px; }
    
    .lotto-card {
      background: rgba(255,255,255,0.05); 
      border-radius: 55px;
      padding: 40px 20px;
      border: 1px solid var(--glass-border) !important;
      display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
      text-align: center;
    }
    
    .lotto-header { 
      margin-top: 100px; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      width: 100%;
      margin-bottom: 40px;
    } 

    .lotto-name { 
      font-size: 32px; font-weight: 800; 
      padding: 12px 50px; border-radius: 100px; 
      margin-bottom: 15px; display: inline-block;
      white-space: nowrap;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      color: #fff;
    }
    
    .lotto-info { font-size: 16px; font-weight: 700; opacity: 0.9; letter-spacing: 2px; }
    
    .ball-grid { 
      display: flex; flex-wrap: wrap; justify-content: center; 
      gap: 12px; margin: 10px 0; 
      min-height: 130px; align-content: center;
    }
    
    /* --- ESTILO DAS BOLAS DA LOTERIA (DISCRETO) --- */
    .ball-item {
      width: 58px; height: 58px;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 24px;
      position: relative;
      /* Sombra e profundidade suavizadas */
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.3);
      border: none !important;
      overflow: hidden;
    }

    /* Brilho superior mais suave */
    .ball-item::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 8px;
      width: 50%;
      height: 30%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
      border-radius: 50%;
    }

    .prize-box { margin-top: auto; padding-top: 20px; }
    .prize-amount { font-size: 38px; font-weight: 800; color: var(--accent); margin-top: 5px; }

    .horo-grid-full { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 20px; flex: 1; margin-bottom: 50px; }
    .horo-box { background: var(--glass); border-radius: 35px; padding: 25px 30px; border: 1px solid var(--glass-border) !important; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
    .horo-box header { display: flex; justify-content: space-between; align-items: center; color: var(--accent); font-size: 28px; font-weight: 800; }
    
    .horo-box p { 
      font-size: 18px; 
      line-height: 1.5; 
      opacity: 0.95; 
      font-weight: 500; 
      max-height: 100px; 
      overflow: hidden; 
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .progress-container { position: absolute; bottom: 30px; left: 50px; right: 50px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    .progress-bar { 
      height: 100%; 
      background: linear-gradient(90deg, var(--accent), #fff); 
      width: 0%; 
      border-radius: 10px; 
      box-shadow: 0 0 20px var(--accent);
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <div class="bg-animation"></div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">--</div>
      </div>

      <div class="weather-card">
        <div id="wIcon" class="w-icon-main">--</div>
        <div class="temp-main"><span id="wTemp">--</span>°C</div>
        <div class="w-desc" id="wDesc">Carregando...</div>
        <div style="margin-top: 15px; font-size: 16px; opacity: 0.7; font-weight: 700; letter-spacing: 2px;">AMERICANA - SP</div>
      </div>

      <div class="logo-area">
        <img src="https://site.wpmaster.com.br/wp-content/uploads/2026/04/logo-kloudads-e1776133415159.png" alt="KloudAds">
        <div class="site-url">WWW.KLOUDADS.COM.BR</div>
      </div>
    </aside>

    <main class="main-area">
      <section class="slide active" id="slide0">
        <h2 class="slide-title">Notícias da Região</h2>
        <div class="news-wrapper">
          <div class="news-featured">
            <img src="" id="newsImg0">
            <div class="news-overlay">
              <h3 id="newsTitle0">Buscando notícias...</h3>
              <p id="newsDesc0"></p>
            </div>
          </div>
          <div class="news-secondary">
            <div class="news-item">
                <h4 id="newsTitle1">...</h4>
                <p id="newsDesc1"></p>
            </div>
            <div class="news-item">
                <h4 id="newsTitle2">...</h4>
                <p id="newsDesc2"></p>
            </div>
            <div class="news-item">
                <h4 id="newsTitle3">...</h4>
                <p id="newsDesc3"></p>
            </div>
            </div>
        </div>
      </section>

      <section class="slide" id="slide1">
        <h2 class="slide-title">Resultados Loterias</h2>
        <div class="lotto-layout" id="lottoContent"></div>
      </section>

      <section class="slide" id="slide2">
        <h2 class="slide-title">Horóscopo do Dia</h2>
        <div class="horo-grid-full" id="horoGrid"></div>
      </section>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </main>
  </div>

  <script>
    const SLIDE_DURATION = 15000;
    let currentSlide = 0;
    const totalSlides = 3;
    let allNews = [];
    let currentNewsIndex = 0;

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      const dateOptions = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
      let dateText = now.toLocaleDateString('pt-BR', dateOptions).toUpperCase();
      dateText = dateText.replace('-FEIRA', '');
      document.getElementById('date').textContent = dateText;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function rotateSlides() {
      const bar = document.getElementById('progressBar');
      let start = null;
      function step(timestamp) {
        if (!start) start = timestamp;
        const progress = timestamp - start;
        const percent = Math.min((progress / SLIDE_DURATION) * 100, 100);
        bar.style.width = percent + '%';
        if (progress < SLIDE_DURATION) {
          window.requestAnimationFrame(step);
        } else {
          document.getElementById(`slide${currentSlide}`).classList.remove('active');
          currentSlide = (currentSlide + 1) % totalSlides;
          if(currentSlide === 0) updateNewsDisplay();
          document.getElementById(`slide${currentSlide}`).classList.add('active');
          start = null;
          window.requestAnimationFrame(step);
        }
      }
      window.requestAnimationFrame(step);
    }
    rotateSlides();

    async function fetchWeather() {
      try {
        const r = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=b0b0fbf4fb3bac7908252d23111a524d');
        const d = await r.json();
        document.getElementById('wTemp').textContent = Math.round(d.main.temp);
        document.getElementById('wDesc').textContent = d.weather[0].description;
        const iconCode = d.weather[0].icon;
        const iconMap = {"01": "☀️","02": "⛅","03": "☁️","04": "🌥️","09": "🌦️","10": "🌧️","11": "⛈️","13": "❄️","50": "🌫️"};
        document.getElementById('wIcon').textContent = iconMap[iconCode.substring(0,2)] || "☀️";
      } catch (e) {}
    }
    fetchWeather();
    setInterval(fetchWeather, 600000);

    async function fetchNews() {
      try {
        const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/sp/campinas-regiao/');
        const d = await r.json();
        if (d.status === 'ok') { allNews = d.items; updateNewsDisplay(); }
      } catch (e) {}
    }

    function updateNewsDisplay() {
      if (allNews.length === 0) return;
      const clean = (t) => t.replace(/<[^>]*>?/gm, '').trim();
      const main = allNews[currentNewsIndex];
      document.getElementById('newsTitle0').textContent = main.title;
      document.getElementById('newsDesc0').textContent = clean(main.description).substring(0, 160) + '...';
      let imageUrl = main.thumbnail || (main.enclosure ? main.enclosure.link : null);
      if (!imageUrl) { const imgMatch = main.description.match(/<img[^>]+src="([^">]+)"/); if (imgMatch) imageUrl = imgMatch[1]; }
      document.getElementById('newsImg0').src = imageUrl || 'https://images.unsplash.com/photo-1504711432869-efd597cdd04b?w=1200';
      for(let i=1; i<=3; i++) {
        const nextIdx = (currentNewsIndex + i) % allNews.length;
        if(allNews[nextIdx]) {
            document.getElementById(`newsTitle${i}`).textContent = allNews[nextIdx].title;
            document.getElementById(`newsDesc${i}`).textContent = clean(allNews[nextIdx].description).substring(0, 100) + '...';
        }
      }
      currentNewsIndex = (currentNewsIndex + 1) % allNews.length;
    }
    fetchNews();

    async function fetchLotto() {
      const container = document.getElementById('lottoContent');
      try {
        const [mega, quina, loto] = await Promise.all([
          fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json()),
          fetch('https://loteriascaixa-api.herokuapp.com/api/quina/latest').then(r => r.json()),
          fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json())
        ]);
        const data = [
          {name: 'MEGA-SENA', d: mega, c: 'var(--mega)'},
          {name: 'QUINA', d: quina, c: 'var(--quina)'},
          {name: 'LOTOFÁCIL', d: loto, c: 'var(--loto)'}
        ];
        container.innerHTML = data.map(g => `
          <div class="lotto-card">
            <div class="lotto-header">
               <div class="lotto-name" style="background: ${g.c}">${g.name}</div>
               <div class="lotto-info">CONCURSO ${g.d.concurso} • ${g.d.data}</div>
            </div>
            <div class="ball-grid">
              ${g.d.dezenas.map(n => `<div class="ball-item" style="background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.15) 0%, ${g.c} 75%)">${n}</div>`).join('')}
            </div>
            <div class="prize-box">
              <p style="font-size:14px; opacity:0.6; margin-bottom:5px; letter-spacing:2px;">ESTIMATIVA PRÊMIO</p>
              <p class="prize-amount">R$ ${g.d.valorEstimadoProximoConcurso.toLocaleString('pt-BR')}</p>
            </div>
          </div>
        `).join('');
      } catch (e) {}
    }
    fetchLotto();

    const ZODIAC_DATA = [
      {s:'Áries', slug:'aries', i:'♈'}, {s:'Touro', slug:'touro', i:'♉'}, {s:'Gêmeos', slug:'gemeos', i:'♊'}, {s:'Câncer', slug:'cancer', i:'♋'}, 
      {s:'Leão', slug:'leao', i:'♌'}, {s:'Virgem', slug:'virgem', i:'♍'}, {s:'Libra', slug:'libra', i:'♎'}, {s:'Escorpião', slug:'escorpiao', i:'♏'}, 
      {s:'Sagitário', slug:'sagitario', i:'♐'}, {s:'Capricórnio', slug:'capricornio', i:'♑'}, {s:'Aquário', slug:'aquario', i:'♒'}, {s:'Peixes', slug:'peixes', i:'♓'}
    ];

    const FALLBACK_MSGS = [
      'Dia de novas oportunidades. Mantenha-se aberto a propostas inesperadas.',
      'Foque na sua saúde e bem-estar. Cuidar de si mesmo deve ser prioridade.',
      'Sua criatividade está em alta. Aproveite para desenvolver projetos.',
      'Momento favorável para decisões financeiras. Planeje seus investimentos.',
      'A comunicação flui bem hoje. Ótimo momento para resolver pendências.',
      'Concentre-se no que realmente importa. Evite distrações inúteis.',
      'Relacionamentos ganham destaque. Valorize quem está ao seu lado.',
      'Bom momento para reflexão interior. A meditação trará clareza.',
      'Surpresas positivas podem chegar. Esteja preparado para mudanças.',
      'A energia do dia favorece novos começos. Não tenha medo de arriscar.',
      'Uma fase de transformação se inicia. Abrace o novo com confiança.',
      'O universo conspira a seu favor. Confie na sua intuição hoje.',
      'Dia propício para fortalecer laços familiares e amizades antigas.',
      'Sua determinação será recompensada. Continue firme nos propósitos.',
      'Novas conexões podem abrir portas. Esteja receptivo a conhecer pessoas.',
      'O momento pede cautela nas palavras. Pense bem antes de agir.',
      'Aproveite a energia positiva para organizar sua rotina e o futuro.',
      'A generosidade será sua aliada. Ajudar os outros trará satisfação.',
      'Momento ideal para aprender algo novo e expandir horizontes.',
      'Confie no seu potencial. Você tem ferramentas para superar desafios.',
      'O equilíbrio entre trabalho e lazer é essencial. Reserve um tempo.',
      'Sua intuição estará aguçada. Use-a para tomar decisões importantes.',
      'Boas notícias podem chegar de longe. Mantenha os canais abertos.',
      'A perseverança é a chave do sucesso hoje. Não desista agora.'
    ];

    function horoHash(idx, doy) { 
        return ((idx * 7 + doy * 13 + idx * doy) % FALLBACK_MSGS.length + FALLBACK_MSGS.length) % FALLBACK_MSGS.length; 
    }

    async function fetchHoroscope() {
      const grid = document.getElementById('horoGrid');
      const now = new Date();
      const doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
      
      const requests = ZODIAC_DATA.map(z => {
        return fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://horoscopo-free-api.vercel.app/api/v1/get-horoscopo/diario?signo=${z.slug}`)}`)
          .then(res => res.json())
          .then(data => JSON.parse(data.contents))
          .catch(() => null);
      });

      try {
        const results = await Promise.all(requests);
        const usedMsgs = new Set();

        grid.innerHTML = ZODIAC_DATA.map((item, index) => {
          let text = results[index]?.texto || results[index]?.horoscopo;
          if (!text) {
             let msgIdx = horoHash(index, doy);
             while(usedMsgs.has(msgIdx)) { msgIdx = (msgIdx + 1) % FALLBACK_MSGS.length; }
             usedMsgs.add(msgIdx);
             text = FALLBACK_MSGS[msgIdx];
          }
          return `
            <div class="horo-box">
              <header><span>${item.s}</span> <span>${item.i}</span></header>
              <p>${text}</p>
            </div>
          `;
        }).join('');
      } catch (e) { console.error(e); }
    }

    fetchHoroscope();
    setInterval(fetchHoroscope, 21600000);
  </script>
</body>
</html>
