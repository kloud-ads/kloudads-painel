<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KloudAds Unified Pro</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:-apple-system, Arial;
}

/* TRANSIÇÃO */
.tela {
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transform:scale(1.08);
  transition:all 1.2s ease;
  display:flex;
  justify-content:center;
  align-items:center;
}
.tela.ativa {
  opacity:1;
  transform:scale(1);
}

/* FUNDO BASE */
.bg {
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* GLASS PADRÃO */
.card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.12);
  border-radius:30px;
  padding:70px 90px;
  text-align:center;
  color:white;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
}

.card h1 {
  font-size:90px;
  margin:0;
}

.card p {
  font-size:65px;
  margin-top:20px;
}

/* FUNDOS TEMÁTICOS */

/* CLIMA */
.clima-bg {
  background: linear-gradient(180deg,#4facfe,#00f2fe);
}

/* HORA */
.hora-bg {
  background: radial-gradient(circle,#111,#000);
}

/* NOTÍCIAS */
.noticia-bg {
  background: linear-gradient(180deg,#1e3c72,#2a5298);
}

/* LOTERIA */
.loteria-bg {
  background: radial-gradient(circle,#006400,#002200);
}

/* HORA TEXTO */
.hora {
  font-size:180px !important;
}

/* LOTERIA NUMEROS */
.numeros {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.bola {
  width:90px;
  height:90px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  animation:pop 0.4s ease;
}

@keyframes pop {
  from { transform:scale(0); }
  to { transform:scale(1); }
}

.sub {
  font-size:40px;
  opacity:0.8;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- CLIMA -->
<div class="tela ativa">
  <div class="bg clima-bg">
    <div class="card">
      <h1>Americana</h1>
      <p id="clima">Carregando...</p>
    </div>
  </div>
</div>

<!-- HORA -->
<div class="tela">
  <div class="bg hora-bg">
    <div class="card">
      <h1>Horário de Brasília</h1>
      <p id="hora" class="hora"></p>
    </div>
  </div>
</div>

<!-- NOTÍCIAS -->
<div class="tela">
  <div class="bg noticia-bg">
    <div class="card">
      <h1>Notícias</h1>
      <p id="noticias">Carregando...</p>
    </div>
  </div>
</div>

<!-- LOTERIA -->
<div class="tela">
  <div class="bg loteria-bg">
    <div class="card">
      <h1>Mega-Sena</h1>
      <div id="concurso" class="sub"></div>
      <div id="numeros" class="numeros"></div>
    </div>
  </div>
</div>

<script>
let telas=document.querySelectorAll('.tela');
let atual=0;

function trocar(){
  telas.forEach(t=>t.classList.remove('ativa'));
  atual=(atual+1)%telas.length;
  telas[atual].classList.add('ativa');
}
setInterval(trocar,8000);

/* HORA */
setInterval(()=>{
  document.getElementById("hora").innerText =
    new Date().toLocaleTimeString("pt-BR");
},1000);

/* CLIMA */
async function clima(){
  let r=await fetch("https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=b0b0fbf4fb3bac7908252d23111a524d");
  let d=await r.json();

  document.getElementById("clima").innerText =
    Math.round(d.main.temp)+"°C - "+d.weather[0].description;
}
clima();
setInterval(clima,300000);

/* NOTÍCIAS */
async function noticias(){
  try{
    let r=await fetch("https://gnews.io/api/v4/top-headlines?lang=pt&country=br&token=572a3b63c9f2a22dcf62bd79b812308c");
    let d=await r.json();

    let i=0;
    setInterval(()=>{
      if(d.articles && d.articles[i]){
        document.getElementById("noticias").innerText =
          d.articles[i].title;
        i=(i+1)%d.articles.length;
      }
    },5000);

  }catch{
    document.getElementById("noticias").innerText="Erro ao carregar notícias";
  }
}
noticias();

/* LOTERIA */
async function loteria(){
  let r=await fetch("https://loteriascaixa-api.herokuapp.com/api/megasena/latest");
  let d=await r.json();

  document.getElementById("concurso").innerText =
    "Concurso " + d.concurso;

  let c=document.getElementById("numeros");
  c.innerHTML="";

  d.dezenas.forEach(n=>{
    let div=document.createElement("div");
    div.className="bola";
    div.innerText=n;
    c.appendChild(div);
  });
}
loteria();
</script>

</body>
</html>
