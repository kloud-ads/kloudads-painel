<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Painel KloudAds</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: #d4af37;
  font-family: Arial;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 50% 50%;
  height: 100vh;
  gap: 10px;
  padding: 10px;
}

.box {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h2>Clima - Americana</h2>
<iframe src="https://wttr.in/Americana?format=3"></iframe>
</div>

<div class="box">
<h2>Notícias</h2>
<iframe src="https://g1.globo.com/sp/campinas-regiao/"></iframe>
</div>

<div class="box">
<h2>Hora</h2>
<iframe src="https://time.is/pt/Americana"></iframe>
</div>

<div class="box">
<h2>Loterias</h2>
<iframe src="https://loterias.caixa.gov.br/"></iframe>
</div>

</div>

</body>
</html>
