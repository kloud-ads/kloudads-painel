<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds Elite - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background: radial-gradient(circle at center, #1a2a6c 0%, #122240 100%);
            height: 100vh; width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        #topo { position: absolute; top: 40px; text-align: center; width: 100%; z-index: 10; }
        #relogio { font-size: 110px; font-weight: 900; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #data-extenso { font-size: 28px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; letter-spacing: 2px; }

        .painel-vidro {
            width: 90%; height: 55%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            margin-top: 100px; position: relative;
        }

        .slide { display: none; width: 100%; text-align: center; animation: fadeIn 0.8s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .tag { font-size: 20px; letter-spacing: 6px; opacity: 0.5; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .cidade { font-size: 40px; color: #fdbb2d; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Clima */
        .clima-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        #clima-emoji { font-size: 130px; }
        .temp-txt { font-size: 160px; font-weight: 900; }
        .desc-clima { font-size: 35px; opacity: 0.9; text-transform: capitalize; }

        /* Loterias */
        .lot-titulo { font-size: 70px; font-weight: 900; margin-bottom: 5px; }
        .lot-meta { font-size: 24px; opacity: 0.7; margin-bottom: 20px; }
        .bolas-wrap { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .bola-num {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: 900; border: 2px solid rgba(255,255,255,0.2);
        }

        /* News */
        .news-flex { display: flex; align-items: center; padding: 0 50px; gap: 40px; text-align: left; }
        #news-img { width: 400px; height: 300px; border-radius: 30px; object-fit: cover; border: 4px solid rgba(255,255,255,0.1); }
        .news-titulo { font-size: 38px; font-weight: 700; line-height: 1.2; flex: 1; }
    </style>
</head>
<body>

    <div id="topo">
        <div id="relogio">--:--:--</div>
        <div id="data-extenso">Carregando data...</div>
    </div>

    <div class="painel-vidro">
        <div class="slide active" id="slide-clima">
            <span class="tag">Previsão do Tempo</span>
            <div class="cidade">Americana - SP</div>
            <div class="clima-row">
                <div id="clima-emoji">🌡️</div>
                <div class="temp-txt" id="display-temp">--°C</div>
            </div>
            <div class="desc-clima" id="display-desc">Atualizando...</div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #209869;">MEGA-SENA</div>
            <div class="lot-meta" id="mega-info">Buscando resultados...</div>
            <div class="bolas-wrap" id="mega-balls"></div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #930089;">LOTOFÁCIL</div>
            <div class="lot-meta" id="loto-info">Buscando resultados...</div>
            <div class="bolas-wrap" id="loto-balls"></div>
        </div>

        <div class="slide">
            <span class="tag">GNews • Brasil</span>
            <div class="news-flex">
                <img id="news-img" src="">
                <div class="news-titulo" id="news-txt">Conectando ao servidor de notícias...</div>
            </div>
        </div>
    </div>

    <script>
        const API_WEATHER = 'b0b0fbf4fb3bac7908252d23111a524d';
        const API_GNEWS = '572a3b63c9f2a22dcf62bd79b812308c';

        // 1. Relógio Independente (Para nunca travar)
        function startClock() {
            setInterval(() => {
                const agora = new Date();
                document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
                document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            }, 1000);
        }

        // 2. Mapeamento de Emojis iPhone
        function getWeatherEmoji(code) {
            const map = {
                '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '10d': '🌦️', '11d': '⛈️', '13d': '❄️', '50d': '🌫️'
            };
            return map[code] || '🌡️';
        }

        // 3. Busca de Dados
        async function fetchData() {
            try {
                // Clima
                const wRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_WEATHER}`);
                const wData = await wRes.json();
                if(wData.main) {
                    document.getElementById('display-temp').innerText = Math.round(wData.main.temp) + '°C';
                    document.getElementById('display-desc').innerText = wData.weather[0].description;
                    document.getElementById('clima-emoji').innerText = getWeatherEmoji(wData.weather[0].icon);
                }

                // Loterias
                const mega = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json());
                document.getElementById('mega-info').innerText = `Concurso ${mega.concurso} (${mega.data})`;
                document.getElementById('mega-balls').innerHTML = mega.dezenas.map(n => `<div class="bola-num" style="background:#209869">${n}</div>`).join('');

                const loto = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json());
                document.getElementById('loto-info').innerText = `Concurso ${loto.concurso} (${loto.data})`;
                document.getElementById('loto-balls').innerHTML = loto.dezenas.map(n => `<div class="bola-num" style="background:#930089; width:60px; height:60px; font-size:28px;">${n}</div>`).join('');

                // Notícias
                const news = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_GNEWS}`).then(r => r.json());
                if(news.articles && news.articles.length > 0) {
                    document.getElementById('news-txt').innerText = news.articles[0].title;
                    document.getElementById('news-img').src = news.articles[0].image;
                }
            } catch (err) {
                console.log("Erro na atualização, tentando novamente em breve...");
            }
        }

        // 4. Sistema de Slides
        let slideIndex = 0;
        function rotate() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
        }

        // Inicialização
        startClock();
        fetchData();
        setInterval(rotate, 15000); // Troca slide a cada 15s
        setInterval(fetchData, 600000); // Atualiza dados a cada 10 min
    </script>
</body>
</html>
