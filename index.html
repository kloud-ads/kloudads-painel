<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds Elite - Americana</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background: radial-gradient(circle at center, #1a2a6c 0%, #122240 100%);
            height: 100vh; width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Inversão: Data em cima, Hora embaixo */
        #topo { 
            position: absolute; 
            top: 40px; 
            text-align: center; 
            width: 100%; 
            z-index: 10;
        }
        #data-extenso { 
            font-size: 35px; 
            text-transform: uppercase; 
            font-weight: 700;
            opacity: 0.9; 
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        #relogio { 
            font-size: 100px; 
            font-weight: 900; 
            line-height: 1; 
            text-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .painel-vidro {
            width: 90%; height: 52%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            margin-top: 140px; 
            position: relative;
        }

        .slide { display: none; width: 100%; text-align: center; animation: fadeIn 0.8s ease; padding: 20px; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 18px; letter-spacing: 5px; opacity: 0.6; text-transform: uppercase; margin-bottom: 15px; display: block; color: #00d2ff; }
        
        /* Clima */
        .clima-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        #clima-emoji { font-size: 120px; }
        .temp-txt { font-size: 150px; font-weight: 900; }
        .desc-clima { font-size: 30px; opacity: 0.9; text-transform: capitalize; }

        /* Loterias */
        .lot-titulo { font-size: 60px; font-weight: 900; margin-bottom: 10px; }
        .bolas-wrap { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .bola-num {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 900; border: 2px solid rgba(255,255,255,0.3);
        }

        /* News */
        .news-titulo { font-size: 40px; font-weight: 700; line-height: 1.3; padding: 0 60px; }

        /* Logo no Rodapé */
        #rodape-logo {
            position: absolute;
            bottom: 30px;
            width: 250px; /* Ajuste o tamanho conforme necessário */
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="topo">
        <div id="data-extenso">---</div>
        <div id="relogio">00:00:00</div>
    </div>

    <div class="painel-vidro">
        <div class="slide active">
            <span class="tag">Previsão do Tempo</span>
            <div style="font-size: 30px; color: #fdbb2d; margin-bottom: 10px;">AMERICANA - SP</div>
            <div class="clima-row">
                <div id="clima-emoji">☀️</div>
                <div class="temp-txt" id="display-temp">--°C</div>
            </div>
            <div class="desc-clima" id="display-desc">Atualizando...</div>
        </div>

        <div class="slide">
            <span class="tag">Notícias Regionais 019</span>
            <div class="news-titulo" id="news-txt">Buscando manchetes...</div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #209869;">MEGA-SENA</div>
            <div id="mega-info" style="margin-bottom:15px; opacity:0.7">---</div>
            <div class="bolas-wrap" id="mega-balls"></div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #930089;">LOTOFÁCIL</div>
            <div id="loto-info" style="margin-bottom:15px; opacity:0.7">---</div>
            <div class="bolas-wrap" id="loto-balls"></div>
        </div>
    </div>

    <img src="image.png" id="rodape-logo" alt="KloudAds Logo">

    <script>
        function updateClock() {
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
            const opcoes = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', opcoes);
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function getClima() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=b0b0fbf4fb3bac7908252d23111a524d`);
                const data = await res.json();
                document.getElementById('display-temp').innerText = Math.round(data.main.temp) + '°C';
                document.getElementById('display-desc').innerText = data.weather[0].description;
                // Emojis simples baseados na condição
                const icon = data.weather[0].icon;
                const emojiMap = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','04d':'☁️','09d':'🌧️','10d':'🌦️','11d':'⛈️'};
                document.getElementById('clima-emoji').innerText = emojiMap[icon] || '🌤️';
            } catch (e) {}
        }

        async function getNews() {
            try {
                const rssUrl = encodeURIComponent('https://g1.globo.com/sp/campinas-regiao/rss/g1/');
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await res.json();
                if(data.items) {
                    const i = Math.floor(Math.random() * 5);
                    document.getElementById('news-txt').innerText = data.items[i].title;
                }
            } catch (e) {}
        }

        async function getLoterias() {
            try {
                const mega = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json());
                document.getElementById('mega-info').innerText = `Concurso ${mega.concurso} - ${mega.data}`;
                document.getElementById('mega-balls').innerHTML = mega.dezenas.map(n => `<div class="bola-num" style="background:#209869">${n}</div>`).join('');

                const loto = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json());
                document.getElementById('loto-info').innerText = `Concurso ${loto.concurso} - ${loto.data}`;
                document.getElementById('loto-balls').innerHTML = loto.dezenas.map(n => `<div class="bola-num" style="background:#930089">${n}</div>`).join('');
            } catch (e) {}
        }

        let currentSlide = 0;
        function rotate() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(s => s.classList.remove('active'));
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        getClima(); getNews(); getLoterias();
        setInterval(rotate, 15000);
        setInterval(() => { getClima(); getNews(); getLoterias(); }, 600000);
    </script>
</body>
</html>
