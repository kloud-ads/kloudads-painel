<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel KloudAds Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; cursor:none; }
    body {
      background: radial-gradient(circle at center, #1a2a6c 0%, #122240 100%);
      height:100vh; width:100vw;
      font-family:'Montserrat',sans-serif;
      color:white; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* Relógio */
    #topo { position:absolute; top:30px; text-align:center; width:100%; }
    #relogio { font-size:90px; font-weight:900; text-shadow:0 8px 25px rgba(0,0,0,0.5); }
    #data-extenso { font-size:26px; text-transform:uppercase; margin-top:5px; opacity:0.8; letter-spacing:2px; }

    /* Painel */
    .painel-vidro {
      width:92%; min-height:60%;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(30px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:40px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 40px 80px rgba(0,0,0,0.6);
      margin-top:120px; position:relative; overflow:hidden;
    }

    .slide { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; transition:opacity 1s ease; padding:40px; text-align:center; }
    .active { opacity:1; z-index:1; }

    .tag { font-size:24px; letter-spacing:6px; opacity:0.6; text-transform:uppercase; margin-bottom:20px; display:block; }

    /* Clima */
    .cidade { font-size:42px; color:#fdbb2d; text-transform:uppercase; margin-bottom:10px; }
    .clima-row { display:flex; align-items:center; justify-content:center; gap:40px; }
    #clima-icon { width:160px; height:160px; }
    .temp-txt { font-size:150px; font-weight:900; }
    .desc-clima { font-size:36px; opacity:0.9; text-transform:capitalize; }

    /* Loterias */
    .lot-titulo { font-size:70px; font-weight:900; margin-bottom:10px; }
    .lot-meta { font-size:28px; opacity:0.7; margin-bottom:25px; }
    .bolas-wrap { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; max-width:95%; margin:0 auto; }
    .bola-num {
      width:75px; height:75px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:36px; font-weight:900;
      border:2px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
      color:white;
    }

    /* Notícias */
    .news-flex { display:flex; align-items:center; justify-content:center; gap:60px; padding:0 40px; }
    #news-img { width:480px; height:320px; border-radius:30px; object-fit:cover; border:5px solid rgba(255,255,255,0.1); }
    .news-titulo { font-size:40px; font-weight:700; line-height:1.3; max-width:800px; text-align:left; }

    /* Horóscopo */
    .horoscopo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:30px; justify-items:center; }
    .signo-card {
      background:rgba(255,255,255,0.1); border-radius:20px;
      padding:20px; width:200px; height:200px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }
    .signo-icon { font-size:60px; margin-bottom:10px; }
    .signo-nome { font-size:22px; font-weight:700; margin-bottom:10px; }
    .signo-txt { font-size:18px; text-align:center; }
  </style>
</head>
