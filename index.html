<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel KloudAds - Digital Signage</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2b5876);
            --glass: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            width: 100vw;
            display: flex;
            color: var(--text-color);
            overflow: hidden;
        }

        /* Coluna Esquerda - 30% (Fixo/Sincronizado) */
        #side-bar {
            width: 30%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            text-align: center;
        }

        #clock { font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .weather-box { transition: opacity 0.5s ease-in-out; }
        .city-name { font-size: 1.8rem; color: var(--accent-color); margin-bottom: 10px; }
        .temp-main { font-size: 4rem; font-weight: bold; }
        .temp-range { font-size: 1.2rem; opacity: 0.8; }

        .logo-area img { width: 180px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

        /* Coluna Direita - 70% (Variável) */
        #main-content {
            width: 70%;
            height: 100%;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-card {
            width: 100%;
            height: 80%;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--glass);
            padding: 30px;
            display: none; /* JS controla exibição */
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Notícias */
        .news-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        .news-title { font-size: 2.2rem; margin-bottom: 15px; line-height: 1.2; }

        /* Estilo Loterias */
        .lotto-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .ball {
            width: 60px; height: 60px; background: #9c27b0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; border: 2px solid #fff;
        }

        /* Estilo Horóscopo */
        .horoscope-box { font-size: 1.8rem; line-height: 1.6; font-style: italic; }

    </style>
</head>
<body>

    <aside id="side-bar">
        <div id="clock">00:00:00</div>
        
        <div class="weather-box" id="weather-display">
            <div class="city-name" id="city">Carregando...</div>
            <div class="temp-main" id="temp">--°C</div>
            <div class="temp-range" id="range">min --° / max --°</div>
        </div>

        <div class="logo-area">
            <strong style="font-size: 1.5rem; letter-spacing: 2px;">KLOUD<span style="color:var(--accent-color)">ADS</span></strong>
        </div>
    </aside>

    <main id="main-content">
        <div id="slide-news" class="content-card">
            <h2 style="color: var(--accent-color); margin-bottom: 20px;">NOTÍCIAS DA REGIÃO</h2>
            <div class="news-item">
                <img id="news-img" src="https://via.placeholder.com/800x400" alt="Notícia">
                <h3 id="news-title" class="news-title">Carregando manchetes...</h3>
            </div>
        </div>

        <div id="slide-lotto" class="content-card">
            <h2 style="color: #ff9800; margin-bottom: 20px;">RESULTADOS LOTOFÁCIL</h2>
            <div class="lotto-grid" id="lotto-numbers">
                </div>
        </div>

        <div id="slide-horoscope" class="content-card">
            <h2 style="color: #e91e63; margin-bottom: 20px;">HORÓSCOPO DO DIA</h2>
            <div class="horoscope-box" id="horoscope-text">
                "As estrelas indicam um dia de grande produtividade e novas oportunidades para o seu signo."
            </div>
        </div>
    </main>

    <script>
        // Configurações
        const cidades = ["Americana", "Campinas", "São Paulo"];
        let currentIndex = 0;

        // Atualizar Relógio
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // Simulação de Dados (Aqui entrariam suas chaves de API reais)
        function updateWeather(city) {
            document.getElementById('city').innerText = city;
            // Exemplo estático - o desenvolvedor deve conectar ao OpenWeather aqui
            const mockTemp = { "Americana": 26, "Campinas": 25, "São Paulo": 23 };
            document.getElementById('temp').innerText = `${mockTemp[city]}°C`;
        }

        function updateLotto() {
            const grid = document.getElementById('lotto-numbers');
            grid.innerHTML = '';
            for(let i=1; i<=15; i++) {
                let n = i.toString().padStart(2, '0');
                grid.innerHTML += `<div class="ball">${n}</div>`;
            }
        }

        // Troca de Slides (Sincronizada)
        function rotateContent() {
            const slides = [
                document.getElementById('slide-news'),
                document.getElementById('slide-lotto'),
                document.getElementById('slide-horoscope')
            ];

            // Esconde todos
            slides.forEach(s => s.style.display = 'none');
            
            // Mostra o atual
            slides[currentIndex].style.display = 'block';
            
            // Atualiza cidade na esquerda
            updateWeather(cidades[currentIndex]);

            // Avança index
            currentIndex = (currentIndex + 1) % slides.length;
        }

        // Inicialização
        updateLotto();
        rotateContent();
        setInterval(rotateContent, 5000); // Troca a cada 5 segundos (Total 15s)

    </script>
</body>
</html>
