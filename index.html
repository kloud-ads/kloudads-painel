<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds - Painel Profissional V2</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #021027, #0b2545, #134074);
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); height: 100vh; width: 100vw; display: flex; color: #fff; overflow: hidden; }

        /* Coluna Esquerda 30% */
        #side-bar {
            width: 30%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 50px 20px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        #clock { font-size: 3.8rem; font-weight: 800; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .weather-info { text-align: center; width: 100%; }
        .city-name { font-size: 2rem; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
        .temp-val { font-size: 5.5rem; font-weight: bold; line-height: 1; }
        .temp-range { font-size: 1.4rem; margin-top: 10px; opacity: 0.9; font-weight: 400; }
        .logo-area { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; }

        /* Coluna Direita 70% */
        #main-content { width: 70%; height: 100%; padding: 40px; display: flex; align-items: center; justify-content: center; }
        .card { 
            width: 100%; height: 85%; background: var(--glass); border-radius: 25px; 
            padding: 40px; border: 1px solid rgba(255,255,255,0.15); display: none;
            animation: slideUp 0.6s ease-out forwards;
        }

        #news-img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; margin: 20px 0; border: 3px solid var(--glass); }
        .news-title { font-size: 2.4rem; font-weight: 700; line-height: 1.2; }

        .lotto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 30px; }
        .ball { 
            width: 70px; height: 70px; background: #9c27b0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .horoscopo-container { font-size: 2.2rem; line-height: 1.5; text-align: center; padding-top: 50px; font-style: italic; color: #ffeb3b; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
