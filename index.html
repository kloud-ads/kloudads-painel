<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel KloudAds Elite - Final Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; cursor:none; }
    body {
      background: radial-gradient(circle at center, #1a2a6c 0%, #122240 100%);
      height:100vh; width:100vw;
      font-family:'Montserrat',sans-serif;
      color:white; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden;
    }

    #topo { position:absolute; top:40px; text-align:center; width:100%; }
    #relogio { font-size:120px; font-weight:900; text-shadow:0 8px 25px rgba(0,0,0,0.5); line-height:1; }
    #data-extenso { font-size:30px; text-transform:uppercase; margin-top:10px; opacity:0.8; letter-spacing:2px; }

    .painel-vidro {
      width:90%; height:58%;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(35px);
      -webkit-backdrop-filter:blur(35px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:50px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 40px 80px rgba(0,0,0,0.6);
      margin-top:100px; position:relative;
    }

    .slide { display: none; width: 100%; text-align: center; animation: fadeIn 0.8s ease-in-out; }
    .active { display: block; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .tag { font-size:22px; letter-spacing:8px; opacity:0.5; text-transform:uppercase; margin-bottom:20px; display:block; }
    .cidade { font-size:45px; color:#fdbb2d; text-transform:uppercase; margin-bottom:10px; }
    
    /* Clima */
    .clima-row { display:flex; align-items:center; justify-content:center; gap:40px; }
    #clima-emoji { font-size: 140px; }
    .temp-txt { font-size:180px; font-weight:900; }
    .desc-clima { font-size:40px; opacity:0.9; text-transform:capitalize; }

    /* Loterias */
    .lot-titulo { font-size:75px; font-weight:900; margin-bottom:10px; }
    .lot-meta { font-size:28px; opacity:0.7; margin-bottom:25px; }
    .bolas-wrap { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; max-width:90%; margin:0 auto; }
    .bola-num {
      width:85px; height:85px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:40px; font-weight:900;
      border:2px solid rgba(255,255,255,0.3);
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    /* Noticias */
    .news-flex { display:flex; align-items:center; justify-content:center; gap:50px; padding:0 60px; text-align:left; }
    #news-img { width:480px; height:340px; border-radius:40px; object-fit:cover; border:5px solid rgba(255,255,255,0.1); }
    .news-titulo { font-size:45px; font-weight:700; line-height:1.2; flex:1; }
  </style>
</head>
<body>

  <div id="topo">
    <div id="relogio">00:00:00</div>
    <div id="data-extenso">Sincronizando...</div>
  </div>

  <div class="painel-vidro">
    <div class="slide active">
      <span class="tag">Previsão do Tempo</span>
      <div class="cidade">Americana - SP</div>
      <div class="clima-row">
        <div id="clima-emoji">☀️</div>
        <div class="temp-txt" id="display-temp">--°C</div>
      </div>
      <div class="desc-clima" id="display-desc">Carregando...</div>
    </div>

    <div class="slide">
      <span class="tag">Loterias Caixa</span>
      <div class="lot-titulo" style="color:#209869;">MEGA-SENA</div>
      <div class="lot-meta" id="mega-info">Concurso ---</div>
      <div class="bolas-wrap" id="mega-balls"></div>
    </div>

    <div class="slide">
      <span class="tag">Loterias Caixa</span>
      <div class="lot-titulo" style="color:#930089;">LOTOFÁCIL</div>
      <div class="lot-meta" id="loto-info">Concurso ---</div>
      <div class="bolas-wrap" id="loto-balls"></div>
    </div>

    <div class="slide">
      <span class="tag">GNews • Brasil</span>
      <div class="news-flex">
        <img id="news-img" src="https://via.placeholder.com/480x340?text=KloudAds">
        <div class="news-titulo" id="news-txt">Atualizando as manchetes...</div>
      </div>
    </div>
  </div>

  <script>
    const API_WEATHER = 'b0b0fbf4fb3bac7908252d23111a524d';
    const API_GNEWS = '572a3b63c9f2a22dcf62bd79b812308c';

    function updateClock() {
      const d = new Date();
      document.getElementById('relogio').innerText = d.toLocaleTimeString('pt-BR');
      document.getElementById('data-extenso').innerText = d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    }
    setInterval(updateClock, 1000);

    function getWeatherEmoji(iconCode) {
      const emojis = {
        '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
        '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
        '09d': '🌧️', '09n': '🌧️', '10d': '🌦️', '10n': '🌧️',
        '11d': '⛈️', '11n': '⛈️', '13d': '❄️', '13n': '❄️', '50d': '🌫️'
      };
      return emojis[iconCode] || '🌡️';
    }

    async function refreshData() {
      try {
        // WEATHER
        const wRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_WEATHER}`);
        const w = await wRes.json();
        document.getElementById('display-temp').innerText = Math.round(w.main.temp) + '°C';
        document.getElementById('display-desc').innerText = w.weather[0].description;
        document.getElementById('clima-emoji').innerText = getWeatherEmoji(w.weather[0].icon);

        // MEGA
        const mRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest');
        const m = await mRes.json();
        document.getElementById('mega-info').innerText = `Concurso ${m.concurso} (${m.data})`;
        document.getElementById('mega-balls').innerHTML = m.dezenas.map(n => `<div class="bola-num" style="background:#209869">${n}</div>`).join('');

        // LOTO
        const lRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest');
        const l = await lRes.json();
        document.getElementById('loto-info').innerText = `Concurso ${l.concurso} (${l.data})`;
        document.getElementById('loto-balls').innerHTML = l.dezenas.map(n => `<div class="bola-num" style="background:#930089; width:65px; height:65px; font-size:30px;">${n}</div>`).join('');

        // GNEWS
        const nRes = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_GNEWS}`);
        const n = await nRes.json();
        if(n.articles.length > 0) {
          document.getElementById('news-txt').innerText = n.articles[0].title;
          document.getElementById('news-img').src = n.articles[0].image;
        }
      } catch(e) { console.error("Erro nas APIs"); }
    }

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    function rotateSlides() {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }

    refreshData();
    updateClock();
    setInterval(rotateSlides, 15000); // Troca a cada 15 seg
    setInterval(refreshData, 900000); // Atualiza dados a cada 15 min
  </script>
</body>
</html>
