<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080,initial-scale=1">
<title>Painel KloudAds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020b14;--sidebar-navy:#001a33;--foreground:#fff;
  --glass-bg:rgba(21,101,192,0.35);--glass-border:rgba(255,255,255,0.2);--glass-blur:10px;
  --header-bar-blue:#0a3d7a;--color-gold:#ffd700;
  --mega-green:#209869;--lotto-magenta:#c71585;--lotto-gold-brown:#8b7500;
  --lottery-ball-purple:#6d28d9;--lottery-ball-purple-mid:#5b21b6;
  --lottery-col-bg:rgba(0,15,40,0.58);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter','Segoe UI','Helvetica Neue',Arial,'Noto Sans',sans-serif;color:var(--foreground);cursor:none;user-select:none;-webkit-font-smoothing:antialiased}
.layout{display:flex;width:100%;height:100%}
.sidebar{width:30%;height:100%;display:flex;flex-direction:column;background:var(--sidebar-navy);border-right:1px solid rgba(255,255,255,0.08);box-shadow:inset -1px 0 0 rgba(0,0,0,0.35);padding:44px 36px;overflow:hidden}
.glass{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);box-shadow:0 12px 40px rgba(0,0,0,0.22);border-radius:20px;padding:20px 24px;width:100%}
.main{width:70%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(135deg,#0c4a8c,#1565c0,#082448);padding:36px 40px 36px 32px;position:relative}
.clock-time{font-weight:800;font-size:96px;line-height:1;letter-spacing:-2px;text-shadow:0 4px 24px rgba(0,0,0,0.25)}
.clock-period{font-size:32px;font-weight:600;opacity:0.9;vertical-align:super;margin-left:6px}
.clock-date{font-size:18px;opacity:0.75;margin-top:12px;letter-spacing:0.5px}
.weather-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.weather-city{font-size:22px;font-weight:500;text-align:center}
.weather-temp{font-size:96px;font-weight:800;line-height:1}
.weather-unit{font-size:32px;font-weight:400;opacity:0.85}
.weather-minmax{font-size:17px;opacity:0.7;margin-bottom:8px}
.weather-minmax strong{opacity:1;font-weight:600}
.weather-desc{font-size:16px;opacity:0.78;font-style:italic}
.logo-section{text-align:center}
.logo-section img{max-height:240px;width:auto;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,0.35));margin-bottom:-16px}
.logo-section p{opacity:0.6;font-size:18px;letter-spacing:0.5px}
.slide-area{flex:1;position:relative;z-index:1}
.slide{display:none;height:100%;flex-direction:column}
.slide.active{display:flex}
.slide-header{background:linear-gradient(90deg,var(--header-bar-blue),#0d5299);box-shadow:0 4px 24px rgba(0,0,0,0.25);border-radius:16px;text-align:center;padding:20px 28px;margin-bottom:28px}
.slide-header h2{font-size:26px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin:0}
.slide-header .badge{display:inline-block;font-size:12px;font-weight:600;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);padding:8px 16px;border-radius:20px;margin-top:8px}
.indicators{position:relative;z-index:1;display:flex;justify-content:center;gap:12px;margin-top:16px}
.indicator{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;transition:all 0.4s}
.indicator.active{opacity:1;font-weight:800}
.indicator:not(.active){opacity:0.45}
.indicator .dot{height:6px;border-radius:9999px;transition:all 0.4s}
.indicator.active .dot{width:20px}
.indicator:not(.active) .dot{width:6px}

/* News */
.news-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.news-featured{grid-column:span 2;border-radius:20px;overflow:hidden;position:relative}
.news-featured::before,.news-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,rgba(255,215,0,0.85),rgba(255,255,255,0.35));border-radius:3px 0 0 3px}
.news-featured-inner{display:grid;grid-template-columns:minmax(280px,38%) 1fr;max-height:340px}
.news-featured-img{position:relative;background:linear-gradient(135deg,rgba(21,101,192,0.5),rgba(30,58,95,0.8))}
.news-featured-img img{width:100%;height:100%;object-fit:cover;display:block}
.news-featured-content{padding:28px;display:flex;flex-direction:column;justify-content:center;gap:10px}
.news-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:0.88}
.news-title-gold{font-size:22px;font-weight:800;line-height:1.3;color:var(--color-gold);text-shadow:0 2px 20px rgba(0,0,0,0.35)}
.news-title{font-size:22px;font-weight:600;line-height:1.3;flex:1}
.news-bullets{list-style:none;margin-top:8px}
.news-bullets li{font-size:13px;line-height:1.45;padding:4px 0 4px 22px;position:relative}
.news-bullets li::before{content:'';position:absolute;left:0;top:14px;width:8px;height:8px;border-radius:50%;background:var(--color-gold);box-shadow:0 0 8px rgba(255,215,0,0.45)}
.news-source{font-size:12px;opacity:0.8;margin-top:12px;display:flex;align-items:center;gap:6px}
.news-source::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--color-gold)}
.news-card{border-radius:20px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}

/* Lottery */
.mega-bar{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);box-shadow:0 12px 40px rgba(0,0,0,0.35);margin-bottom:28px}
.mega-bar-top{display:flex;flex-wrap:wrap;align-items:center;gap:22px;padding:18px 24px;background:rgba(0,0,0,0.22);backdrop-filter:blur(8px)}
.mega-badge{display:inline-flex;align-items:center;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:11px 24px;border-radius:9999px;border:1px solid rgba(255,255,255,0.28);background:var(--mega-green);box-shadow:0 4px 16px rgba(32,152,105,0.45);flex-shrink:0}
.mega-nums{display:flex;flex-wrap:wrap;align-items:center;gap:12px;flex:1;min-width:220px}
.mega-nums .info{font-size:13px;font-weight:700;opacity:0.9;letter-spacing:0.5px}
.mega-nums .prize{font-size:13px;opacity:0.88;margin-left:auto}
.mega-nums .prize strong{color:var(--color-gold);font-weight:800}
.mega-bar-bottom{text-align:center;font-size:21px;font-weight:900;letter-spacing:8px;text-transform:uppercase;padding:14px 20px;background:linear-gradient(90deg,#0a5c3a,var(--mega-green),#0a5c3a)}
.lotto-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center}
.lotto-col{border-radius:20px;text-align:center;overflow:hidden;border:1px solid rgba(255,255,255,0.35);background:var(--lottery-col-bg);box-shadow:0 16px 48px rgba(0,0,0,0.4);padding-bottom:28px}
.lotto-badge{display:inline-block;font-size:17px;font-weight:900;letter-spacing:3px;padding:10px 28px;border-radius:9999px;border:1px solid rgba(255,255,255,0.25);margin:22px 0 18px}
.lotto-badge.magenta{background:var(--lotto-magenta)}
.lotto-badge.gold{background:linear-gradient(to bottom,#a67c00,var(--lotto-gold-brown))}
.lotto-concurso{font-size:13px;opacity:0.8;margin-bottom:20px}
.ball-grid{display:grid;justify-items:center;gap:8px;max-width:400px;margin:0 auto;padding:0 16px}
.ball-grid.cols5{grid-template-columns:repeat(5,1fr)}
.ball{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;position:relative}
.ball::before{content:'';position:absolute;top:6px;left:10px;width:14px;height:8px;background:rgba(255,255,255,0.35);border-radius:50%;transform:rotate(-25deg)}
.ball-mega{width:42px;height:42px;font-size:16px;background:linear-gradient(145deg,#2ecc71,var(--mega-green));box-shadow:0 4px 14px rgba(0,0,0,0.35)}
.ball-purple{width:44px;height:44px;font-size:17px;background:linear-gradient(145deg,var(--lottery-ball-purple),var(--lottery-ball-purple-mid));border:2px solid rgba(255,255,255,0.28)}
.ball-purple.sm{width:36px;height:36px;font-size:14px}
.lotto-prize{margin-top:18px;font-size:13px;opacity:0.78}
.lotto-prize strong{font-size:17px;font-weight:800}
.lotto-prize strong.pink{color:#ffb4c8}
.lotto-prize strong.gold{color:var(--color-gold)}

/* Horoscope */
.horo-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:center}
.horo-card{border-radius:20px;padding:30px 28px;display:flex;flex-direction:column;overflow:hidden}
.horo-header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.horo-symbol{width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.horo-sign{font-size:22px;font-weight:800;color:var(--color-gold);text-shadow:0 2px 14px rgba(0,0,0,0.35)}
.horo-dates{font-size:12px;opacity:0.55;margin-top:2px}
.horo-msg{font-size:18px;line-height:1.6;flex:1}
.horo-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.horo-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22);opacity:0.88}

@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp 0.5s ease forwards;opacity:0}
</style>
</head>

      <div class="slide" id="slide-horoscope">
        <div class="slide-header"><h2>Horóscopo do Dia</h2><span class="badge" id="horoDate"></span></div>
        <div class="horo-grid" id="horoGrid"></div>
      </div>
    </div>
    <div class="indicators" id="indicators"></div>
  </div>
</div>

<script>
// ========== UTILS ==========
const IS_LOCAL=location.protocol==='file:';
function lsGet(k){try{return JSON.parse(localStorage.getItem('kloudads_'+k));}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem('kloudads_'+k,JSON.stringify(v));}catch{}}

// ========== CLOCK ==========
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
function updateClock(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes().toString().padStart(2,'0');
  const p=h>=12?'PM':'AM',dh=h>12?h-12:h===0?12:h;
  document.getElementById('clockTime').textContent=dh.toString().padStart(2,'0')+':'+m;
  document.getElementById('clockPeriod').textContent=p;
  document.getElementById('clockDate').textContent=DAYS[n.getDay()]+', '+n.getDate().toString().padStart(2,'0')+' de '+MONTHS[n.getMonth()]+' de '+n.getFullYear();
}
updateClock();setInterval(updateClock,1000);

// ========== WEATHER ==========
function nightIcon(icon){const h=new Date().getHours();if(h>=18||h<6){if(icon==='☀️'||icon==='🌤️')return'🌙';if(icon==='⛅')return'☁️';}return icon;}
const CITIES=[
  {name:'Campinas, SP',temp:26,min:20,max:29,desc:'Céu limpo com poucas nuvens',icon:'☀️'},
  {name:'Americana, SP',temp:28,min:22,max:31,desc:'Sol com nuvens esparsas',icon:'⛅'},
  {name:'São Paulo, SP',temp:23,min:18,max:25,desc:'Parcialmente nublado',icon:'🌤️'},
  {name:'Limeira, SP',temp:27,min:21,max:30,desc:'Tempo seco e ensolarado',icon:'☀️'},
  {name:'Piracicaba, SP',temp:25,min:19,max:28,desc:'Possibilidade de chuva leve',icon:'🌦️'},
];
let cityIdx=0,useApi=true;
function setWeather(w){
  document.getElementById('wCity').textContent=w.name;
  document.getElementById('wTemp').textContent=w.temp;
  document.getElementById('wMin').textContent=w.min;
  document.getElementById('wMax').textContent=w.max;
  document.getElementById('wDesc').textContent=w.desc;
}
async function fetchWeather(){
  if(IS_LOCAL){useApi=false;rotateCities();return;}
  try{
    const r=await fetch('https://wttr.in/-22.7394,-47.3311?format=j1');
    if(!r.ok)throw 0;const d=await r.json(),c=d.current_condition[0];
    let icon='🌤️';const wc=+c.weatherCode;
    if(wc===113)icon='☀️';else if(wc===116)icon='⛅';else if([119,122].includes(wc))icon='☁️';
    else if([176,263,266,293,296].includes(wc))icon='🌦️';else if([299,302,305,308,356,359].includes(wc))icon='🌧️';
    else if([200,386,389].includes(wc))icon='⛈️';else if([227,230,323,326,329,332].includes(wc))icon='❄️';
    else if([143,248,260].includes(wc))icon='🌫️';
    const w={name:'Americana, SP',temp:+c.temp_C,min:+d.weather[0].mintempC,max:+d.weather[0].maxtempC,desc:c.lang_pt?.[0]?.value||c.weatherDesc[0].value};
    setWeather(w);lsSet('weather',w);
    useApi=true;
  }catch{
    useApi=false;
    const cached=lsGet('weather');
    if(cached){setWeather(cached);}else{rotateCities();}
  }
}
function rotateCities(){
  if(useApi)return;
  const c=CITIES[cityIdx];setWeather(c);
  cityIdx=(cityIdx+1)%CITIES.length;
}
fetchWeather();setInterval(fetchWeather,600000);
setInterval(()=>{if(!useApi)rotateCities();},15000);

// ========== SLIDES ==========
const SLIDE_KEYS=['news','lottery','horoscope'];
const SLIDE_COLORS=['#90caf9','#c71585','#ffd700'];
const SLIDE_LABELS=['Notícias','Loterias','Horóscopo'];
let currentSlide=0;
function showSlide(idx){
  SLIDE_KEYS.forEach((k,i)=>{document.getElementById('slide-'+k).classList.toggle('active',i===idx);});
  document.querySelectorAll('.indicator').forEach((el,i)=>{el.classList.toggle('active',i===idx);});
  currentSlide=idx;
}
// Build indicators
const indEl=document.getElementById('indicators');
SLIDE_KEYS.forEach((_,i)=>{
  const d=document.createElement('div');d.className='indicator'+(i===0?' active':'');
  d.innerHTML='<span class="dot" style="background:'+SLIDE_COLORS[i]+'"></span>'+SLIDE_LABELS[i];
  indEl.appendChild(d);
});
showSlide(0);
setInterval(()=>showSlide((currentSlide+1)%3),5000);

// ========== NEWS ==========
const CATEGORIES=['🔴 Destaque','Regional','Política','Economia','Cotidiano','Educação','Saúde','Cultura','Tecnologia','Esporte'];
const fallbackNews=[
  {title:'Região: acompanhe notícias e serviços em Campinas e cidades vizinhas',category:'🔴 Destaque',source:'G1 Campinas e Região',image:null,bullets:['Dados ao vivo dependem da conexão com o feed RSS.','Verifique firewall e CORS ao abrir o arquivo localmente.']},
  {title:'Ato do 8 de fevereiro discutirá impactos das enchentes em Campinas',category:'Política',source:'G1 Campinas'},
  {title:'Economia regional: empresas acompanham indicadores e investimentos na área',category:'Economia',source:'G1 Regional'},
];
let allNews=[],newsPage=0;
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return(d.textContent||'').replace(/\s+/g,' ').trim();}
function getBullets(h){const t=stripHtml(h);if(t.length<40)return[];return t.split(/\.\s+/).filter(s=>s.length>30).slice(0,2).map(s=>s.endsWith('.')?s:s+'.');}
function extractImage(item){if(item.thumbnail)return item.thumbnail;if(item.enclosure?.link)return item.enclosure.link;const m=(item.content||item.description||'').match(/<img[^>]+src=["']([^"']+)["']/i);return m?m[1]:null;}
async function fetchNews(){
  if(IS_LOCAL){allNews=lsGet('news')||fallbackNews;renderNews();return;}
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent('https://g1.globo.com/rss/g1/sp/campinas-regiao/'));
    const d=await r.json();
    if(Array.isArray(d.items)&&d.items.length>=3){
      const items=d.items.map((item,idx)=>{
        const el=document.createElement('div');el.innerHTML=item.title||'';
        const title=(el.textContent||'').trim();if(!title)return null;
        return{title,category:CATEGORIES[idx%CATEGORIES.length],source:'G1 Campinas e Região',image:extractImage(item),bullets:idx===0?getBullets(item.content||item.description||''):undefined};
      }).filter(Boolean);
      allNews=items.length>=3?items:fallbackNews;
      if(allNews!==fallbackNews)lsSet('news',allNews);
    }else allNews=lsGet('news')||fallbackNews;
  }catch{allNews=lsGet('news')||fallbackNews;}
  renderNews();
}
function renderNews(){
  const pool=allNews.length?allNews:fallbackNews;
  const start=(newsPage*3)%pool.length;
  const display=[];for(let i=0;i<3;i++)display.push(pool[(start+i)%pool.length]);
  const featured=display[0],others=display.slice(1);
  const g=document.getElementById('newsGrid');
  let html='<div class="news-featured glass fade-in"><div class="news-featured-inner">';
  html+='<div class="news-featured-img">'+(featured.image?'<img src="'+featured.image+'" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">':'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:0.35;background:linear-gradient(135deg,rgba(21,101,192,0.3),rgba(128,0,255,0.2))">📰</div>')+'</div>';
  html+='<div class="news-featured-content"><div class="news-cat">'+featured.category+'</div><div class="news-title-gold">'+featured.title+'</div>';
  if(featured.bullets?.length){html+='<ul class="news-bullets">';featured.bullets.forEach(b=>{html+='<li>'+b+'</li>';});html+='</ul>';}
  html+='<div class="news-source">'+featured.source+'</div></div></div></div>';
  others.forEach((item,i)=>{
    html+='<div class="news-card glass fade-in" style="animation-delay:'+(0.15+i*0.1)+'s"><div class="news-cat">'+item.category+'</div><div class="news-title">'+item.title+'</div><div class="news-source">'+item.source+'</div></div>';
  });
  g.innerHTML=html;
}
fetchNews();setInterval(fetchNews,300000);
setInterval(()=>{newsPage++;renderNews();},5000);

// ========== LOTTERY ==========
function pad2(n){return n.toString().padStart(2,'0');}
function fmtBRL(v){return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2});}
function genNums(count,max){const s=new Set();while(s.size<count)s.add(Math.floor(Math.random()*max)+1);return[...s].sort((a,b)=>a-b);}
let megaData={c:'2.XXX',n:[],p:'R$ ---'},lotoData={c:'X.XXX',n:[],p:'R$ ---'},maniaData={c:'X.XXX',n:[],p:'R$ ---'};
async function fetchLottery(){
  if(IS_LOCAL){
    const cached=lsGet('lottery');
    if(cached){megaData=cached.mega;lotoData=cached.loto;maniaData=cached.mania;}
    renderLottery();return;
  }
  try{
    const[mR,lR,maR]=await Promise.allSettled([
      fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest'),
      fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest'),
      fetch('https://loteriascaixa-api.herokuapp.com/api/lotomania/latest'),
    ]);
    if(mR.status==='fulfilled'&&mR.value.ok){const d=await mR.value.json();megaData={c:''+(d.concurso||'2.XXX'),n:d.dezenas?d.dezenas.map(Number):genNums(6,60),p:d.premiacoes?.[0]?.valorPremio?fmtBRL(d.premiacoes[0].valorPremio):fmtBRL(48500000)};}
    if(lR.status==='fulfilled'&&lR.value.ok){const d=await lR.value.json();lotoData={c:''+(d.concurso||'X.XXX'),n:d.dezenas?d.dezenas.map(Number):genNums(15,25),p:d.premiacoes?.[0]?.valorPremio?fmtBRL(d.premiacoes[0].valorPremio):fmtBRL(1700000)};}
    if(maR.status==='fulfilled'&&maR.value.ok){const d=await maR.value.json();maniaData={c:''+(d.concurso||'X.XXX'),n:d.dezenas?d.dezenas.map(Number).slice(0,20):genNums(20,99),p:d.premiacoes?.[0]?.valorPremio?fmtBRL(d.premiacoes[0].valorPremio):fmtBRL(3200000)};}
    lsSet('lottery',{mega:megaData,loto:lotoData,mania:maniaData});
  }catch{
    const cached=lsGet('lottery');
    if(cached){megaData=cached.mega;lotoData=cached.loto;maniaData=cached.mania;}
    else{
      megaData={c:'2.845',n:genNums(6,60),p:fmtBRL(48500000)};
      lotoData={c:'3.412',n:genNums(15,25),p:fmtBRL(1700000)};
      maniaData={c:'2.678',n:genNums(20,99),p:fmtBRL(3200000)};
    }
  }
  renderLottery();
}
function renderLottery(){
  const el=document.getElementById('lotteryContent');
  let h='<div class="mega-bar"><div class="mega-bar-top"><span class="mega-badge">Mega-Sena</span><div class="mega-nums"><span class="info">Concurso '+megaData.c+'</span><div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">';
  megaData.n.forEach(n=>{h+='<div class="ball ball-mega">'+pad2(n)+'</div>';});
  h+='</div><span class="prize">Prêmio: <strong>'+megaData.p+'</strong></span></div></div><div class="mega-bar-bottom">MEGA-SENA</div></div>';
  h+='<div class="lotto-grid"><div class="lotto-col"><div class="lotto-badge magenta">LOTOFÁCIL</div><div class="lotto-concurso">Concurso '+lotoData.c+'</div><div class="ball-grid cols5">';
  lotoData.n.forEach(n=>{h+='<div class="ball ball-purple">'+pad2(n)+'</div>';});
  h+='</div><div class="lotto-prize">Prêmio: <strong class="pink">'+lotoData.p+'</strong></div></div>';
  h+='<div class="lotto-col"><div class="lotto-badge gold">LOTOMANIA</div><div class="lotto-concurso">Concurso '+maniaData.c+'</div><div class="ball-grid cols5">';
  maniaData.n.forEach(n=>{h+='<div class="ball ball-purple sm">'+pad2(n)+'</div>';});
  h+='</div><div class="lotto-prize">Prêmio: <strong class="gold">'+maniaData.p+'</strong></div></div></div>';
  el.innerHTML=h;
}
fetchLottery();setInterval(fetchLottery,300000);

// ========== HOROSCOPE ==========
const ZODIAC=[
  {sign:'Áries',symbol:'♈',dates:'21/03 - 19/04',keywords:['Energia','Coragem','Ação']},
  {sign:'Touro',symbol:'♉',dates:'20/04 - 20/05',keywords:['Estabilidade','Amor','Paciência']},
  {sign:'Gêmeos',symbol:'♊',dates:'21/05 - 20/06',keywords:['Comunicação','Versatilidade']},
  {sign:'Câncer',symbol:'♋',dates:'21/06 - 22/07',keywords:['Família','Proteção','Intuição']},
  {sign:'Leão',symbol:'♌',dates:'23/07 - 22/08',keywords:['Criatividade','Liderança']},
  {sign:'Virgem',symbol:'♍',dates:'23/08 - 22/09',keywords:['Organização','Saúde','Detalhe']},
  {sign:'Libra',symbol:'♎',dates:'23/09 - 22/10',keywords:['Harmonia','Equilíbrio']},
  {sign:'Escorpião',symbol:'♏',dates:'23/10 - 21/11',keywords:['Transformação','Intensidade']},
  {sign:'Sagitário',symbol:'♐',dates:'22/11 - 21/12',keywords:['Aventura','Otimismo']},
  {sign:'Capricórnio',symbol:'♑',dates:'22/12 - 19/01',keywords:['Disciplina','Ambição']},
  {sign:'Aquário',symbol:'♒',dates:'20/01 - 18/02',keywords:['Inovação','Liberdade']},
  {sign:'Peixes',symbol:'♓',dates:'19/02 - 20/03',keywords:['Sensibilidade','Sonhos']},
];
const HORO_MSGS=[
  'Dia de novas oportunidades. Mantenha-se aberto a propostas inesperadas que podem surgir.',
  'Foque na sua saúde e bem-estar. Cuidar de si mesmo deve ser prioridade hoje.',
  'Sua criatividade está em alta. Aproveite para desenvolver projetos pessoais importantes.',
  'Momento favorável para decisões financeiras. Planeje com cuidado seus investimentos.',
  'A comunicação flui bem hoje. Ótimo momento para resolver pendências e diálogos.',
  'Concentre-se no que realmente importa. Evite distrações e mantenha o foco nos objetivos.',
  'Relacionamentos ganham destaque. Valorize quem está ao seu lado e demonstre carinho.',
  'Bom momento para reflexão interior. Meditar pode trazer clareza sobre questões importantes.',
  'Surpresas positivas podem chegar. Esteja preparado para mudanças favoráveis.',
  'A energia do dia favorece novos começos. Não tenha medo de recomeçar algo.',
  'Uma fase de transformação se inicia. Abrace as mudanças com confiança e determinação.',
  'O universo conspira a seu favor. Confie na sua intuição e siga em frente.',
  'Dia propício para fortalecer laços familiares. Dedique tempo a quem você ama.',
  'Sua determinação será recompensada. Continue firme em seus propósitos e colha os frutos.',
  'Novas conexões podem abrir portas importantes. Esteja receptivo a conhecer pessoas.',
  'O momento pede cautela nas palavras. Pense antes de falar e evite mal-entendidos.',
  'Aproveite a energia positiva para organizar sua rotina e planejar o futuro.',
  'A generosidade será sua aliada. Ajudar os outros trará satisfação pessoal profunda.',
  'Momento ideal para aprender algo novo. Invista em conhecimento e crescimento pessoal.',
  'Confie no seu potencial. Você tem todas as ferramentas para superar os desafios do dia.',
  'O equilíbrio entre trabalho e lazer é essencial hoje. Reserve tempo para relaxar.',
  'Sua intuição estará aguçada. Use-a para tomar decisões importantes com sabedoria.',
  'Boas notícias podem chegar de longe. Mantenha os canais de comunicação abertos.',
  'A perseverança é a chave do sucesso hoje. Não desista diante dos obstáculos.'
];
function horoHash(idx,doy){return((idx*7+doy*13+idx*doy)%HORO_MSGS.length+HORO_MSGS.length)%HORO_MSGS.length;}
function renderHoroscope(){
  const now=new Date();
  const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const startIdx=doy%12;
  document.getElementById('horoDate').textContent=now.getDate().toString().padStart(2,'0')+' de '+MONTHS[now.getMonth()];
  const g=document.getElementById('horoGrid');let h='';const usedMsgs=new Set();
  for(let i=0;i<3;i++){
    const idx=(startIdx+i*4)%12;const s=ZODIAC[idx];
    let msgIdx=horoHash(idx,doy);let attempts=0;
    while(usedMsgs.has(msgIdx)&&attempts<HORO_MSGS.length){msgIdx=(msgIdx+1)%HORO_MSGS.length;attempts++;}
    usedMsgs.add(msgIdx);const msg=HORO_MSGS[msgIdx];
    h+='<div class="horo-card glass fade-in" style="animation-delay:'+(i*0.1+0.05)+'s"><div class="horo-header"><div class="horo-symbol">'+s.symbol+'</div><div><div class="horo-sign">'+s.sign.toUpperCase()+':</div><div class="horo-dates">'+s.dates+'</div></div></div><div class="horo-msg">'+msg+'</div><div class="horo-tags">';
    s.keywords.forEach(k=>{h+='<span class="horo-tag">'+k+'</span>';});
    h+='</div></div>';
  }
  g.innerHTML=h;
}
renderHoroscope();

// ========== LOGO (PNG embutido em base64; ficheiro externo não necessário) ==========
</script>
</body>
