<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KloudAds Broadcast PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* TELAS */
.tela {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: all 1.2s ease;
  display: flex;
  justify-content: center;
  align-items: center;
}

.ativa {
  opacity: 1;
}

/* ===== CLIMA ===== */
.clima-bg {
  width: 100%;
  height: 100%;
  background: linear-gradient(#4facfe, #00c6ff);
  position: relative;
  overflow: hidden;
}

.nuvem {
  position: absolute;
  width: 300px;
  height: 100px;
  background: white;
  border-radius: 100px;
  opacity: 0.6;
  animation: mover 40s linear infinite;
}

@keyframes mover {
  from { left: -300px; }
  to { left: 110%; }
}

.sol {
  width: 120px;
  height: 120px;
  background: radial-gradient(circle,#FFD700,#FFA500);
  border-radius: 50%;
  animation: pulsar 3s infinite;
}

@keyframes pulsar {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.chuva {
  position: absolute;
  width: 2px;
  height: 15px;
  background: white;
  animation: cair 1s linear infinite;
}

@keyframes cair {
  from { transform: translateY(-100px); }
  to { transform: translateY(100vh); }
}

.glass {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.15);
  padding: 60px;
  border-radius: 25px;
  text-align: center;
  color: white;
}

.glass h1 {
  font-size: 90px;
}

.glass p {
  font-size: 70px;
}

/* ===== HORA ===== */
.relogio h1 {
  font-size: 200px;
  color: white;
}

/* ===== PADRÃO ===== */
.padrao {
  flex-direction: column;
  text-align: center;
}

.padrao h1 {
  font-size: 110px;
  color: #d4af37;
}

.padrao p {
  font-size: 65px;
  color: white;
  max-width: 80%;
}
</style>
</head>

<body>

<!-- CLIMA -->
<div class="tela ativa">
  <div class="clima-bg" id="climaBg">
    <div class="nuvem" style="top:20%"></div>
    <div class="nuvem" style="top:50%"></div>

    <div class="glass">
      <div id="iconeClima"></div>
      <h1>Americana</h1>
      <p id="clima"></p>
    </div>
  </div>
</div>

<!-- HORA -->
<div class="tela">
  <div class="relogio">
    <h1 id="hora"></h1>
  </div>
</div>

<!-- NOTÍCIAS -->
<div class="tela padrao">
  <h1>Notícias</h1>
  <p id="noticias"></p>
</div>

<!-- LOTERIA -->
<div class="tela padrao">
  <h1>Loterias</h1>
  <p id="loteria"></p>
</div>

<script>
let telas = document.querySelectorAll('.tela');
let atual = 0;

function trocarTela(){
  telas.forEach(t=>t.classList.remove('ativa'));
  atual=(atual+1)%telas.length;
  telas[atual].classList.add('ativa');
}
setInterval(trocarTela,8000);

/* RELÓGIO */
setInterval(()=>{
  document.getElementById("hora").innerText =
    new Date().toLocaleTimeString();
},1000);

/* CLIMA */
async function clima(){
  let url = `https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=b0b0fbf4fb3bac7908252d23111a524d`;
  let res = await fetch(url);
  let data = await res.json();

  let temp = Math.round(data.main.temp);
  let cond = data.weather[0].main;

  document.getElementById("clima").innerText = temp+"°C";

  let icone = document.getElementById("iconeClima");
  let bg = document.getElementById("climaBg");

  if(cond.includes("Rain")){
    icone.innerHTML = "🌧";
    bg.style.background = "linear-gradient(#4e54c8,#8f94fb)";
  } else if(cond.includes("Cloud")){
    icone.innerHTML = "☁️";
    bg.style.background = "linear-gradient(#757f9a,#d7dde8)";
  } else {
    icone.innerHTML = "<div class='sol'></div>";
    bg.style.background = "linear-gradient(#4facfe,#00f2fe)";
  }
}
clima();

/* NOTÍCIAS (GNEWS) */
async function noticias(){
  let url = `https://gnews.io/api/v4/top-headlines?lang=pt&country=br&token=572a3b63c9f2a22dcf62bd79b812308c`;
  let res = await fetch(url);
  let data = await res.json();

  let i=0;
  setInterval(()=>{
    if(data.articles[i]){
      document.getElementById("noticias").innerText = data.articles[i].title;
      i=(i+1)%data.articles.length;
    }
  },5000);
}
noticias();

/* LOTERIA */
async function loteria(){
  let res = await fetch("https://loteriascaixa-api.herokuapp.com/api/megasena/latest");
  let data = await res.json();

  document.getElementById("loteria").innerText =
    "Mega-Sena: " + data.dezenas.join(" ");
}
loteria();
</script>

</body>
</html>
