<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KloudAds Cinema Display 32"</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #020617;
      --accent: #FFD700;
      --text: #f8fafc;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.15);
      --sidebar-width: 420px;
      --mega: #209869;
      --quina: #260085;
      --loto: #941156;
      --bg-blue: #003366;
      --bg-gradient: radial-gradient(circle at 10% 10%, #00509e 0%, #003366 45%),
                    radial-gradient(circle at 90% 90%, #004080 0%, #003366 45%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; }

    body, html {
      width: 100vw; height: 100vh; 
      overflow: hidden !important; 
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-blue); color: var(--text);
    }

    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-gradient);
      z-index: -1;
    }

    .app-container {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      width: 100%; height: 100%;
    }

    /* SIDEBAR */
    .sidebar {
      background: rgba(0, 30, 60, 0.6);
      backdrop-filter: blur(30px);
      padding: 40px 30px; 
      display: flex; 
      flex-direction: column;
      justify-content: space-between;
      border-right: 2px solid var(--glass-border);
      height: 100vh;
    }

    .clock-section { text-align: center; }
    .clock {
      font-size: 110px; font-weight: 800; line-height: 0.9;
      letter-spacing: -5px; color: var(--accent);
      text-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }

    .date {
      font-size: 16px; text-transform: uppercase; letter-spacing: 1px; 
      margin-top: 15px; color: #fff; opacity: 0.9; font-weight: 600;
      white-space: nowrap; display: block;
    }

    .weather-card {
      background: var(--glass); border-radius: 40px; 
      padding: 30px 20px; text-align: center;
      border: 1px solid var(--glass-border) !important;
    }

    .city-name { font-size: 26px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
    .w-icon-main { font-size: 80px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
    .temp-now { font-size: 85px; font-weight: 800; line-height: 1; }
    .w-desc { font-size: 19px; opacity: 0.9; text-transform: capitalize; margin-bottom: 15px; }

    .w-minmax-row {
      display: flex; gap: 30px; justify-content: center;
      margin-bottom: 20px; border-top: 1px solid var(--glass-border) !important;
      padding-top: 15px; width: 85%; margin: 0 auto 20px;
    }
    .w-mm-val { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 4px; }

    .w-footer-info {
      display: flex; justify-content: space-around;
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;
    }
    .w-f-val { font-size: 19px; font-weight: 800; }

    .logo-area { text-align: center; padding-bottom: 10px; }
    .logo-area img { width: 100%; max-width: 280px; height: auto; object-fit: contain; }
    .site-url { font-size: 13px; letter-spacing: 3px; opacity: 0.6; margin-top: 15px; }

    /* MAIN AREA */
    .main-area { position: relative; padding: 50px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .slide {
      position: absolute; inset: 50px;
      opacity: 0; transform: translateY(20px);
      transition: all 1s ease-in-out;
      visibility: hidden;
      display: flex; flex-direction: column;
    }
    .slide.active { opacity: 1; transform: translateY(0); visibility: visible; }

    .slide-title { font-size: 44px; font-weight: 800; margin-bottom: 35px; display: flex; align-items: center; gap: 25px; }
    .slide-title::after { content: ''; height: 4px; flex: 1; background: linear-gradient(90deg, var(--accent), transparent); border-radius: 2px; }

    /* LOTERIAS */
    .lotto-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex: 1; margin-bottom: 50px; }
    .lotto-card { background: rgba(255,255,255,0.05); border-radius: 55px; padding: 30px 20px; border: 1px solid var(--glass-border) !important; display: flex; flex-direction: column; justify-content: space-between; height: 680px; }
    .lotto-header { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; } 
    .lotto-logo { height: 75px; width: auto; max-width: 90%; object-fit: contain; margin-bottom: 15px; }
    .lotto-info { font-size: 18px; font-weight: 700; opacity: 0.8; letter-spacing: 1px; }
    .ball-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; }
    
    /* Layout Padrão das Bolas (Quina e Lotofacil) */
    .ball-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; max-width: 450px; }
    
    /* Ajuste exclusivo para Mega-Sena */
    .ball-grid.mega-line { flex-wrap: nowrap !important; max-width: 100% !important; gap: 8px; }
    .ball-grid.mega-line .ball-item { width: 60px; height: 60px; font-size: 24px; }

    .ball-item { width: 68px; height: 68px; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 28px; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4); flex-shrink: 0; }
    
    .prize-box { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-top: 1px solid rgba(255,255,255,0.1) !important; }
    .prize-label { font-size: 18px; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin-bottom: 8px; }
    .prize-amount { font-size: 48px; font-weight: 800; color: var(--accent); text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

    /* NOTÍCIAS */
    .news-wrapper { display: grid; grid-template-columns: 1.5fr 1fr; grid-template-rows: 1fr 1fr; gap: 30px; flex: 1; overflow: hidden; margin-bottom: 50px; }
    .news-featured { grid-row: 1 / 3; position: relative; border-radius: 50px; overflow: hidden; background: #004080; }
    .news-featured img { width: 100%; height: 100%; object-fit: cover; }
    .news-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 80px 50px 50px; background: linear-gradient(transparent, rgba(0,30,60,0.98)); }
    .news-overlay h3 { font-size: 44px; line-height: 1.1; margin-bottom: 15px; color: var(--accent); }
    .news-overlay p { font-size: 21px; opacity: 0.95; line-height: 1.5; }
    .news-secondary { display: grid; grid-template-rows: repeat(3, 1fr); gap: 20px; }
    .news-item { background: var(--glass); border-radius: 25px; padding: 25px 30px; border: 1px solid var(--glass-border) !important; display: flex; flex-direction: column; justify-content: center; }
    .news-item h4 { font-size: 23px; font-weight: 600; line-height: 1.3; }

    /* HORÓSCOPO */
    .horo-grid-full { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; flex: 1; margin-bottom: 50px; min-height: 0; }
    .horo-box { background: var(--glass); border-radius: 25px; padding: 18px; border: 1px solid var(--glass-border) !important; display: flex; flex-direction: column; overflow: hidden; }
    .horo-box header { display: flex; justify-content: space-between; color: var(--accent); font-size: 26px; font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1) !important; padding-bottom: 6px; flex-shrink: 0; }
    .horo-box p { font-size: 17px; line-height: 1.25; color: #f1f5f9; font-weight: 500; text-align: left; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; text-overflow: ellipsis; }

    /* PROGRESS BAR */
    .progress-container { position: absolute; bottom: 30px; left: 50px; right: 50px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #fff); width: 0%; border-radius: 10px; transition: width 0.1s linear; }
  </style>
</head>
<body>

  <div class="bg-animation"></div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">--</div>
      </div>
      <div class="weather-card">
        <div class="city-name">AMERICANA - SP</div>
        <div id="wIcon" class="w-icon-main">--</div>
        <div class="temp-now"><span id="wTemp">--</span>°</div>
        <div class="w-desc" id="wDesc">Carregando...</div>
        <div class="w-minmax-row">
          <div class="w-mm-item"><span class="w-mm-val" style="color: #60a5fa;">↓<span id="wMin">--</span>°</span></div>
          <div class="w-mm-item"><span class="w-mm-val" style="color: #ef4444;">↑<span id="wMax">--</span>°</span></div>
        </div>
        <div class="w-footer-info">
           <div class="w-f-item"><span class="w-f-val"><span id="wFeels">--</span>°C</span></div>
           <div class="w-f-item"><span class="w-f-val"><span id="wHumi">--</span>% UR</span></div>
        </div>
      </div>
      <div class="logo-area">
        <img src="https://site.wpmaster.com.br/wp-content/uploads/2026/04/logo-kloudads-e1776133415159.png" alt="KloudAds">
        <div class="site-url">WWW.KLOUDADS.COM.BR</div>
      </div>
    </aside>

    <main class="main-area">
      <section class="slide active" id="slide0">
        <h2 class="slide-title">Notícias da Região</h2>
        <div class="news-wrapper">
          <div class="news-featured">
            <img src="" id="newsImg0">
            <div class="news-overlay">
              <h3 id="newsTitle0">Buscando notícias...</h3>
              <p id="newsDesc0"></p>
            </div>
          </div>
          <div class="news-secondary">
            <div class="news-item"><h4 id="newsTitle1">...</h4><p id="newsDesc1"></p></div>
            <div class="news-item"><h4 id="newsTitle2">...</h4><p id="newsDesc2"></p></div>
            <div class="news-item"><h4 id="newsTitle3">...</h4><p id="newsDesc3"></p></div>
          </div>
        </div>
      </section>

      <section class="slide" id="slide1">
        <h2 class="slide-title">Resultados Loterias</h2>
        <div class="lotto-layout" id="lottoContent"></div>
      </section>

      <section class="slide" id="slide2">
        <h2 class="slide-title">Horóscopo do Dia</h2>
        <div class="horo-grid-full" id="horoGrid"></div>
      </section>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </main>
  </div>

  <script>
    const SLIDE_DURATION = 10000; 
    let currentSlide = 0;
    const totalSlides = 3;
    let allNews = [];
    let currentNewsIndex = 0;

    const NINJAS_API_KEY = 'SUA_CHAVE_AQUI'; 

    const ZODIAC_DATA = [
      {s:'Áries', slug:'aries', i:'♈'}, {s:'Touro', slug:'taurus', i:'♉'},
      {s:'Gêmeos', slug:'gemini', i:'♊'}, {s:'Câncer', slug:'cancer', i:'♋'},
      {s:'Leão', slug:'leo', i:'♌'}, {s:'Virgem', slug:'virgo', i:'♍'},
      {s:'Libra', slug:'libra', i:'♎'}, {s:'Escorpião', slug:'scorpio', i:'♏'},
      {s:'Sagitário', slug:'sagittarius', i:'♐'}, {s:'Capricórnio', slug:'capricorn', i:'♑'},
      {s:'Aquário', slug:'aquarius', i:'♒'}, {s:'Peixes', slug:'pisces', i:'♓'}
    ];

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      const dateOptions = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', dateOptions).toUpperCase();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function rotateSlides() {
      const bar = document.getElementById('progressBar');
      let start = null;
      function step(timestamp) {
        if (!start) start = timestamp;
        const progress = timestamp - start;
        const percent = Math.min((progress / SLIDE_DURATION) * 100, 100);
        bar.style.width = percent + '%';
        if (progress < SLIDE_DURATION) {
          window.requestAnimationFrame(step);
        } else {
          document.getElementById(`slide${currentSlide}`).classList.remove('active');
          currentSlide = (currentSlide + 1) % totalSlides;
          if(currentSlide === 0) updateNewsDisplay();
          document.getElementById(`slide${currentSlide}`).classList.add('active');
          start = null;
          window.requestAnimationFrame(step);
        }
      }
      window.requestAnimationFrame(step);
    }
    rotateSlides();

    async function fetchWeather() {
      try {
        const API_KEY = 'b0b0fbf4fb3bac7908252d23111a524d';
        const CITY = 'Americana,BR';
        const [currRes, foreRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&lang=pt_br&appid=${API_KEY}`),
          fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${CITY}&units=metric&lang=pt_br&appid=${API_KEY}`)
        ]);
        const currData = await currRes.json();
        const foreData = await foreRes.json();
        document.getElementById('wTemp').textContent = Math.round(currData.main.temp);
        document.getElementById('wDesc').textContent = currData.weather[0].description;
        document.getElementById('wFeels').textContent = Math.round(currData.main.feels_like);
        document.getElementById('wHumi').textContent = currData.main.humidity;
        const next24h = foreData.list.slice(0, 8);
        document.getElementById('wMin').textContent = Math.floor(Math.min(...next24h.map(i => i.main.temp_min)));
        document.getElementById('wMax').textContent = Math.ceil(Math.max(...next24h.map(i => i.main.temp_max)));
        const iconMap = {"01d":"☀️","01n":"🌙","02d":"⛅","02n":"☁️","03d":"☁️","03n":"☁️","04d":"🌥️","04n":"☁️","09d":"🌦️","09n":"🌧️","10d":"🌧️","10n":"🌧️","11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️","50d":"🌫️","50n":"🌫️"};
        document.getElementById('wIcon').textContent = iconMap[currData.weather[0].icon] || "☀️";
      } catch (e) {}
    }
    fetchWeather();

    async function fetchNews() {
      try {
        const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/sp/campinas-regiao/');
        const d = await r.json();
        if (d.status === 'ok') { allNews = d.items; updateNewsDisplay(); }
      } catch (e) {}
    }
    function updateNewsDisplay() {
      if (allNews.length === 0) return;
      const clean = (t) => t.replace(/<[^>]*>?/gm, '').trim();
      const main = allNews[currentNewsIndex];
      const backupImg = 'https://images.unsplash.com/photo-1504711432869-efd597cdd04b?q=80&w=1200&auto=format&fit=crop';
      const mainImgElement = document.getElementById('newsImg0');
      let imageUrl = main.thumbnail || (main.enclosure ? main.enclosure.link : '');
      mainImgElement.src = imageUrl || backupImg;
      mainImgElement.onerror = function() { this.src = backupImg; };
      document.getElementById('newsTitle0').textContent = main.title;
      document.getElementById('newsDesc0').textContent = clean(main.description).substring(0, 160) + '...';
      for(let i=1; i<=3; i++) {
        const n = allNews[(currentNewsIndex + i) % allNews.length];
        document.getElementById(`newsTitle${i}`).textContent = n.title;
        document.getElementById(`newsDesc${i}`).textContent = clean(n.description).substring(0, 100) + '...';
      }
      currentNewsIndex = (currentNewsIndex + 1) % allNews.length;
    }
    fetchNews();

    async function fetchLotto() {
      const container = document.getElementById('lottoContent');
      try {
        const [mega, quina, loto] = await Promise.all([
          fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest').then(r => r.json()),
          fetch('https://loteriascaixa-api.herokuapp.com/api/quina/latest').then(r => r.json()),
          fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest').then(r => r.json())
        ]);
        const data = [
          { id: 'mega', name: 'MEGA-SENA', logo: 'https://kloudads.com.br/wp-content/uploads/2026/04/mega.png', d: mega, c: 'var(--mega)' },
          { id: 'quina', name: 'QUINA', logo: 'https://kloudads.com.br/wp-content/uploads/2026/04/quina.png', d: quina, c: 'var(--quina)' },
          { id: 'loto', name: 'LOTOFÁCIL', logo: 'https://kloudads.com.br/wp-content/uploads/2026/04/lotofacil.png', d: loto, c: 'var(--loto)' }
        ];
        container.innerHTML = data.map(g => `
          <div class="lotto-card">
            <div class="lotto-header">
              <img src="${g.logo}" alt="${g.name}" class="lotto-logo">
              <div class="lotto-info">CONCURSO ${g.d.concurso} • ${g.d.data}</div>
            </div>
            <div class="ball-container">
              <div class="ball-grid ${g.id === 'mega' ? 'mega-line' : ''}">
                ${g.d.dezenas.map(n => `<div class="ball-item" style="background: ${g.c}">${n}</div>`).join('')}
              </div>
            </div>
            <div class="prize-box">
              <p class="prize-label">Prêmio Estimado</p>
              <p class="prize-amount">R$ ${g.d.valorEstimadoProximoConcurso.toLocaleString('pt-BR')}</p>
            </div>
          </div>`).join('');
      } catch (e) {}
    }
    fetchLotto();

    async function translateText(text) {
      try {
        const apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(apiUrl);
        const data = await response.json();
        return data[0].map(item => item[0]).join('');
      } catch (e) { return text; }
    }

    async function fetchHoroscope() {
      const grid = document.getElementById('horoGrid');
      const promises = ZODIAC_DATA.map(async (signoObj) => {
        try {
          const res = await fetch(`https://api.api-ninjas.com/v1/horoscope?zodiac=${signoObj.slug}`, {
            headers: { 'X-Api-Key': NINJAS_API_KEY }
          });
          const data = await res.json();
          let textPortuguese = await translateText(data.horoscope || "");
          let firstPoint = textPortuguese.indexOf('.');
          let secondPoint = textPortuguese.indexOf('.', firstPoint + 1);
          if (secondPoint !== -1) {
            textPortuguese = textPortuguese.substring(0, secondPoint + 1);
          } else if (firstPoint !== -1) {
            textPortuguese = textPortuguese.substring(0, firstPoint + 1);
          }
          return { ...signoObj, texto: textPortuguese };
        } catch (e) {
          return { ...signoObj, texto: "As estrelas estão preparando novidades." };
        }
      });
      const results = await Promise.all(promises);
      grid.innerHTML = results.map(item => `
        <div class="horo-box">
          <header><span>${item.s}</span><span>${item.i}</span></header>
          <p>${item.texto}</p>
        </div>
      `).join('');
    }

    fetchHoroscope();
    setInterval(fetchHoroscope, 43200000);
  </script>
</body>
</html>
