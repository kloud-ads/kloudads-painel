<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KloudAds Premium PRO</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: #d4af37;
}

/* container */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* telas */
.tela {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(-60px);
  transition: all 1s ease;
  text-align: center;
  padding: 40px;
}

/* ativa */
.tela.ativa {
  opacity: 1;
  transform: translateY(0);
}

/* saindo */
.tela.saindo {
  opacity: 0;
  transform: translateY(60px);
}

/* TITULO GRANDE */
h1 {
  font-size: 120px;
  margin-bottom: 30px;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(212,175,55,0.6);
}

/* TEXTO GRANDE */
p {
  font-size: 70px;
  color: #fff;
  max-width: 85%;
  line-height: 1.3;
}

/* relógio */
#hora {
  font-size: 140px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="tela ativa">
  <h1>Clima</h1>
  <p>☀️ Americana - 25°C</p>
</div>

<div class="tela">
  <h1>Hora</h1>
  <p id="hora"></p>
</div>

<div class="tela">
  <h1>Notícias</h1>
  <p>Campinas e região seguem em crescimento e desenvolvimento econômico</p>
</div>

<div class="tela">
  <h1>Esportes</h1>
  <p>Rodada do futebol brasileiro movimenta o final de semana</p>
</div>

<div class="tela">
  <h1>Loterias</h1>
  <p id="loteria"></p>
</div>

<div class="tela">
  <h1>Horóscopo</h1>
  <p id="horoscopo"></p>
</div>

</div>

<script>
let telas = document.querySelectorAll('.tela');
let atual = 0;

function trocarTela() {
  let anterior = atual;
  atual = (atual + 1) % telas.length;

  telas.forEach((tela, i) => {
    tela.classList.remove('ativa', 'saindo');

    if (i === atual) {
      tela.classList.add('ativa');
    } else if (i === anterior) {
      tela.classList.add('saindo');
    }
  });
}

// troca a cada 7s
setInterval(trocarTela, 7000);

/* RELÓGIO */
function atualizarHora() {
  const agora = new Date();
  document.getElementById("hora").innerText =
    agora.toLocaleTimeString();
}
setInterval(atualizarHora, 1000);
atualizarHora();

/* LOTERIAS (simulado profissional) */
let loterias = [
  "Mega-Sena: 12 - 23 - 34 - 45 - 56 - 60",
  "Lotofácil: 01 - 03 - 05 - 07 - 09 - 11 - 13 - 15",
  "Lotomania: 02 - 10 - 22 - 35 - 44 - 55 - 66"
];

let iLoteria = 0;

function atualizarLoteria() {
  document.getElementById("loteria").innerText = loterias[iLoteria];
  iLoteria = (iLoteria + 1) % loterias.length;
}

setInterval(atualizarLoteria, 3000);
atualizarLoteria();

/* HORÓSCOPO DINÂMICO */
let signos = [
  "Áries: Momento de decisões importantes.",
  "Touro: Estabilidade e foco trazem resultados.",
  "Gêmeos: Comunicação será essencial hoje.",
  "Câncer: Cuide das emoções e do bem-estar.",
  "Leão: Destaque e reconhecimento no caminho.",
  "Virgem: Organização será sua força.",
  "Libra: Busque equilíbrio nas decisões.",
  "Escorpião: Transformações positivas chegando.",
  "Sagitário: Oportunidades inesperadas surgirão.",
  "Capricórnio: Persistência traz conquistas.",
  "Aquário: Inovação e criatividade em alta.",
  "Peixes: Intuição será seu guia hoje."
];

let iSigno = 0;

function atualizarHoroscopo() {
  document.getElementById("horoscopo").innerText = signos[iSigno];
  iSigno = (iSigno + 1) % signos.length;
}

setInterval(atualizarHoroscopo, 4000);
atualizarHoroscopo();
</script>

</body>
</html>
