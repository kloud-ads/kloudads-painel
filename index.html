<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KloudAds Elite - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background: radial-gradient(circle at center, #1a2a6c 0%, #122240 100%);
            height: 100vh;
            width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Relógio e Data no Topo */
        #topo { position: absolute; top: 40px; text-align: center; width: 100%; }
        #relogio { font-size: 130px; font-weight: 900; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #data-extenso { font-size: 32px; text-transform: uppercase; margin-top: 5px; opacity: 0.8; letter-spacing: 2px; }

        /* Painel de Vidro Centralizado */
        .painel-vidro {
            width: 90%;
            height: 58%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            margin-top: 100px;
            position: relative;
        }

        .slide { display: none; width: 100%; text-align: center; animation: fadeIn 0.8s ease-out; padding: 20px; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Estilos de Conteúdo */
        .tag { font-size: 22px; letter-spacing: 8px; opacity: 0.5; text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        /* Clima com Emoji */
        .clima-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        #clima-emoji { font-size: 140px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .temp-txt { font-size: 180px; font-weight: 900; }
        .cidade { font-size: 40px; color: #fdbb2d; text-transform: uppercase; margin-bottom: 10px; }
        .desc-clima { font-size: 35px; opacity: 0.9; text-transform: capitalize; }

        /* Loterias */
        .lot-titulo { font-size: 75px; font-weight: 900; margin-bottom: 5px; }
        .lot-meta { font-size: 28px; opacity: 0.7; margin-bottom: 25px; }
        .bolas-wrap { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; max-width: 95%; margin: 0 auto; }
        .bola-num {
            width: 85px; height: 85px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 900; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Notícias */
        .news-flex { display: flex; align-items: center; padding: 0 60px; gap: 40px; text-align: left; }
        #news-img { width: 450px; height: 320px; border-radius: 40px; object-fit: cover; border: 5px solid rgba(255,255,255,0.1); }
        .news-titulo { font-size: 42px; font-weight: 700; line-height: 1.2; }
    </style>
</head>
<body>

    <div id="topo">
        <div id="relogio">00:00:00</div>
        <div id="data-extenso">Sábado, 4 de Abril</div>
    </div>

    <div class="painel-vidro">
        <div class="slide active">
            <span class="tag">Previsão do Tempo</span>
            <div class="cidade">Americana - SP</div>
            <div class="clima-row">
                <div id="clima-emoji">☀️</div>
                <div class="temp-txt" id="display-temp">--°C</div>
            </div>
            <div class="desc-clima" id="display-desc">Carregando...</div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #209869;">MEGA-SENA</div>
            <div class="lot-meta" id="mega-info">Buscando concurso...</div>
            <div class="bolas-wrap" id="mega-balls"></div>
        </div>

        <div class="slide">
            <span class="tag">Loterias Caixa</span>
            <div class="lot-titulo" style="color: #930089;">LOTOFÁCIL</div>
            <div class="lot-meta" id="loto-info">Buscando concurso...</div>
            <div class="bolas-wrap" id="loto-balls"></div>
        </div>

        <div class="slide">
            <span class="tag">GNews • Brasil</span>
            <div class="news-flex">
                <img id="news-img" src="">
                <div class="news-titulo" id="news-txt">Atualizando as principais notícias...</div>
            </div>
        </div>
    </div>

    <script>
        const API_WEATHER = 'b0b0fbf4fb3bac7908252d23111a524d';
        const API_GNEWS = '572a3b63c9f2a22dcf62bd79b812308c';

        // Lógica dos Emojis Inteligentes
        function getWeatherEmoji(code) {
            const map = {
                '01d': '☀️', '01n': '🌙', // céu limpo
                '02d': '⛅', '02n': '☁️', // poucas nuvens
                '03d': '☁️', '03n': '☁️', // nuvens
                '04d': '☁️', '04n': '☁️', // nublado
                '09d': '🌧️', '09n': '🌧️', // chuva leve
                '10d': '🌦️', '10n': '🌧️', // chuva
                '11d': '⛈️', '11n': '⛈️', // tempestade
                '13d': '❄️', '13n': '❄️', // neve
                '50d': '🌫️', '50n': '🌫️'  // névoa
            };
            return map[code] || '🌡️';
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('relogio').innerText = d.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);

        async function refreshData() {
            try {
                // CLIMA
                const wRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_WEATHER}`);
                const w = await wRes.json();
                document.getElementById('display-temp').innerText = Math.round(w.main.temp) + '°C';
                document.getElementById('display-desc').innerText = w.weather[0].description;
                document.getElementById('clima-emoji').innerText = getWeatherEmoji(w.weather[0].icon);

                // MEGA-SENA
                const mRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest');
                const m = await mRes.json();
                document.getElementById('mega-info').innerText = `Concurso ${m.concurso} (${m.data})`;
                document.getElementById('mega-balls').innerHTML = m.dezenas.map(n => `<div class="bola-num" style="background:#209869">${n}</div>`).join('');

                // LOTOFÁCIL
                const lRes = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest');
                const l = await lRes.json();
                document.getElementById('loto-info').innerText = `Concurso ${l.concurso} (${l.data})`;
                document.getElementById('loto-balls').innerHTML = l.dezenas.map(n => `<div class="bola-num" style="background:#930089; width:65px; height:65px; font-size:32px;">${n}</div>`).join('');

                // GNEWS
                const nRes = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_GNEWS}`);
                const n = await nRes.json();
                if(n.articles.length > 0) {
                    document.getElementById('news-txt').innerText = n.articles[0].title;
                    document.getElementById('news-img').src = n.articles[0].image;
                }
            } catch(e) { console.error("Falha ao sincronizar"); }
        }

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        function rotateSlides() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        refreshData();
        updateClock();
        setInterval(rotateSlides, 15000);
        setInterval(refreshData, 900000);
    </script>
</body>
</html>
