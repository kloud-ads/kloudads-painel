<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia Indoor Americana</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --mega: #209869;
            --loto: #930089;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Topo: Relógio */
        #header { text-align: center; padding: 30px 0; }
        #clock { font-size: 90px; font-weight: 800; letter-spacing: 2px; }
        #date { font-size: 24px; opacity: 0.8; text-transform: uppercase; }

        /* Container Principal */
        .container {
            width: 90vw;
            height: 65vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--border);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .slide {
            display: none;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease forwards;
        }

        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Loterias */
        .ball-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 30px 0; }
        .ball {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: bold; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Notícias */
        .news-flex { display: flex; align-items: center; gap: 40px; text-align: left; }
        #news-img { width: 50%; height: 400px; border-radius: 20px; object-fit: cover; }
        #news-text { width: 50%; }

        /* Clima */
        .clima-row { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .temp { font-size: 160px; font-weight: bold; }

        .label { font-size: 20px; letter-spacing: 5px; opacity: 0.7; margin-bottom: 10px; text-transform: uppercase; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header">
        <div id="clock">00:00:00</div>
        <div id="date">---</div>
    </div>

    <div class="container">
        <div class="slide active" id="slide-clima">
            <div class="label">Previsão do Tempo</div>
            <h1 style="font-size: 50px;">AMERICANA - SP</h1>
            <div class="clima-row">
                <img id="w-icon" src="" style="width: 200px;">
                <div class="temp" id="w-temp">--°</div>
            </div>
            <p id="w-desc" style="font-size: 35px; text-transform: capitalize;">Carregando...</p>
        </div>

        <div class="slide">
            <div class="label">Loterias | Mega-Sena</div>
            <h2 id="mega-concurso" style="font-size: 35px;">Carregando...</h2>
            <div class="ball-container" id="mega-balls"></div>
            <p id="mega-premio" style="font-size: 30px; color: #55ff55;"></p>
        </div>

        <div class="slide">
            <div class="label">Loterias | Lotofácil</div>
            <h2 id="loto-concurso" style="font-size: 35px;">Carregando...</h2>
            <div class="ball-container" id="loto-balls"></div>
        </div>

        <div class="slide">
            <div class="label">Últimas Notícias</div>
            <div class="news-flex">
                <img id="news-img" src="https://via.placeholder.com/600x400?text=Noticias">
                <div id="news-text">
                    <h2 id="news-title" style="font-size: 38px; line-height: 1.2;">Buscando manchetes...</h2>
                    <p id="news-source" style="font-size: 22px; margin-top: 20px; color: #fdbb2d;"></p>
                </div>
            </div>
        </div>

        <div class="slide">
            <div class="label">Horóscopo do Dia</div>
            <h1 id="h-signo" style="font-size: 70px; color: #fdbb2d;">---</h1>
            <p id="h-texto" style="font-size: 35px; padding: 0 60px; margin-top: 30px; line-height: 1.4;"></p>
        </div>
    </div>

    <script>
        const API_WEATHER = 'b0b0fbf4fb3bac7908252d23111a524d';
        const API_GNEWS = '572a3b63c9f2a22dcf62bd79b812308c';

        // 1. Relógio
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000);

        // 2. Clima
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${API_WEATHER}`);
                const d = await res.json();
                document.getElementById('w-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('w-desc').innerText = d.weather[0].description;
                document.getElementById('w-icon').src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;
            } catch (e) { console.error(e); }
        }

        // 3. Loterias (Usando Proxy para evitar erro de CORS)
        async function fetchLoterias() {
            try {
                const res = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest');
                const mega = await res.json();
                document.getElementById('mega-concurso').innerText = `Concurso ${mega.concurso} (${mega.data})`;
                const mBalls = document.getElementById('mega-balls');
                mBalls.innerHTML = '';
                mega.dezenas.forEach(n => {
                    mBalls.innerHTML += `<div class="ball" style="background:#209869">${n}</div>`;
                });
                document.getElementById('mega-premio').innerText = `Prêmio: ${mega.valorEstimadoProximoConcurso.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`;

                const res2 = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest');
                const loto = await res2.json();
                document.getElementById('loto-concurso').innerText = `Concurso ${loto.concurso}`;
                const lBalls = document.getElementById('loto-balls');
                lBalls.innerHTML = '';
                loto.dezenas.forEach(n => {
                    lBalls.innerHTML += `<div class="ball" style="background:#930089; width:60px; height:60px; font-size:25px;">${n}</div>`;
                });
            } catch (e) { console.error("Erro nas loterias"); }
        }

        // 4. Notícias
        async function fetchNews() {
            try {
                const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&max=1&apikey=${API_GNEWS}`);
                const d = await res.json();
                if(d.articles.length > 0) {
                    document.getElementById('news-title').innerText = d.articles[0].title;
                    document.getElementById('news-img').src = d.articles[0].image;
                    document.getElementById('news-source').innerText = `Fonte: ${d.articles[0].source.name} • ${d.articles[0].publishedAt.split('T')[0]}`;
                }
            } catch (e) { console.error(e); }
        }

        // 5. Horóscopo (Ciclo de signos)
        const signos = [
            {n: "Áries", t: "O momento pede foco total nos seus objetivos profissionais. Evite distrações."},
            {n: "Touro", t: "Sua determinação será recompensada. Bom dia para organizar as finanças."},
            {n: "Gêmeos", t: "Novas conexões podem surgir hoje. Seja aberto a ouvir opiniões diferentes."}
        ];
        let sIdx = 0;
        function updateHoro() {
            document.getElementById('h-signo').innerText = signos[sIdx].n;
            document.getElementById('h-texto').innerText = signos[sIdx].t;
            sIdx = (sIdx + 1) % signos.length;
        }

        // Sistema de Carrossel
        let slideIdx = 0;
        const slides = document.querySelectorAll('.slide');
        function rotateSlides() {
            slides[slideIdx].classList.remove('active');
            slideIdx = (slideIdx + 1) % slides.length;
            slides[slideIdx].classList.add('active');
            if(slides[slideIdx].id === '') updateHoro(); 
        }

        // Início
        fetchWeather();
        fetchLoterias();
        fetchNews();
        updateHoro();
        setInterval(rotateSlides, 15000); // Troca a cada 15 segundos
        setInterval(fetchWeather, 600000); // Atualiza clima a cada 10 min
    </script>
</body>
</html>
