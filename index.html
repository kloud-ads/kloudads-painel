<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
    <title>Painel KloudAds Pro - 1920x1080</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #020b14;
            --sidebar-navy: #001a33;
            --glass-bg: rgba(21, 101, 192, 0.35);
            --glass-border: rgba(255, 255, 255, 0.2);
            --color-gold: #ffd700;
            --mega-green: #209869;
            --lotto-magenta: #c71585;
        }

        body, html { 
            width: 1920px; height: 1080px; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Inter', sans-serif; color: #fff;
            cursor: none; user-select: none;
        }

        .layout { display: flex; width: 1920px; height: 1080px; }

        /* SIDEBAR (30%) - 576px */
        .sidebar {
            width: 576px; height: 1080px; background: var(--sidebar-navy);
            display: flex; flex-direction: column; padding: 40px;
            border-right: 2px solid rgba(255,255,255,0.1); justify-content: space-between;
        }

        /* MAIN AREA (70%) - 1344px */
        .main {
            width: 1344px; height: 1080px;
            background: linear-gradient(135deg, #0c4a8c, #082448);
            padding: 40px; position: relative;
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 30px;
        }

        /* AJUSTE DE IMAGENS - ANTI-DISTORÇÃO */
        img { max-width: 100%; height: auto; object-fit: cover; }
        .news-img-container { width: 100%; height: 500px; overflow: hidden; border-radius: 20px; border: 4px solid var(--glass-border); }
        .news-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* LOGO - LIMPO */
        .logo-box { text-align: center; padding-top: 20px; }
        .logo-box img { max-height: 120px; object-fit: contain; }

        /* CLIMA E RELÓGIO */
        .clock-time { font-size: 110px; font-weight: 900; text-align: center; line-height: 1; }
        .weather-temp { font-size: 100px; font-weight: 800; text-align: center; color: var(--color-gold); }

        /* SLIDES */
        .slide { display: none; height: 100%; animation: fadeIn 0.8s ease; }
        .slide.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* LOTERIA */
        .ball-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; justify-content: center; }
        .ball { 
            width: 55px; height: 55px; border-radius: 50%; background: #fff; color: #000; 
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px;
        }
        .ball.mega { background: var(--mega-green); color: #fff; }
        .ball.facil { background: var(--lotto-magenta); color: #fff; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="glass">
            <div class="clock-time" id="clockTime">00:00</div>
            <div id="clockDate" style="text-align: center; opacity: 0.7; font-size: 20px; margin-top: 10px;">--</div>
        </div>

        <div class="glass">
            <div id="wCity" style="text-align: center; font-size: 24px; font-weight: 600;">Americana</div>
            <div class="weather-temp" id="wTemp">--°</div>
            <div id="wDesc" style="text-align: center; text-transform: capitalize; font-size: 20px;">Carregando...</div>
        </div>

        <div class="logo-box">
            <img src="logo.png" alt="KloudAds" onerror="this.src='https://via.placeholder.com/300x100?text=Sua+Logo+Aqui'">
        </div>
    </div>

    <main class="main">
        <div id="slide-news" class="slide active">
            <h1 style="font-size: 40px; margin-bottom: 30px; border-left: 10px solid var(--color-gold); padding-left: 20px;">NOTÍCIAS DO DIA</h1>
            <div class="news-img-container">
                <img id="news-img" src="" alt="">
            </div>
            <h2 id="news-title" style="margin-top: 30px; font-size: 36px; line-height: 1.2; color: var(--color-gold);">Carregando notícias...</h2>
        </div>

        <div id="slide-lotto" class="slide">
            <h1 style="font-size: 40px; margin-bottom: 30px; border-left: 10px solid #fff; padding-left: 20px;">RESULTADOS LOTERIAS</h1>
            <div class="glass" style="margin-bottom: 20px;">
                <h3 style="color: var(--mega-green); font-size: 28px;">MEGA-SENA <span id="mega-concurso" style="color:#fff; font-size: 18px;"></span></h3>
                <div class="ball-grid" id="mega-balls"></div>
            </div>
            <div class="glass">
                <h3 style="color: var(--lotto-magenta); font-size: 28px;">LOTOFÁCIL <span id="facil-concurso" style="color:#fff; font-size: 18px;"></span></h3>
                <div class="ball-grid" id="facil-balls"></div>
            </div>
        </div>
    </main>
</div>

<script>
    // Configurações
    const W_KEY = 'b0b0fbf4fb3bac7908252d23111a524d';
    const G_KEY = '572a3b63c9f2a22dcf62bd79b812308c';

    function updateClock() {
        const now = new Date();
        document.getElementById('clockTime').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('clockDate').innerText = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'});
    }
    setInterval(updateClock, 1000);

    async function getClima() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Americana,br&units=metric&lang=pt_br&appid=${W_KEY}`);
            const data = await res.json();
            document.getElementById('wTemp').innerText = Math.round(data.main.temp) + '°';
            document.getElementById('wDesc').innerText = data.weather[0].description;
        } catch (e) { console.log("Erro clima"); }
    }

    async function getNews() {
        try {
            const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&apikey=${G_KEY}`);
            const data = await res.json();
            if(data.articles) {
                const a = data.articles[Math.floor(Math.random()*data.articles.length)];
                document.getElementById('news-title').innerText = a.title;
                document.getElementById('news-img').src = a.image;
            }
        } catch (e) { console.log("Erro news"); }
    }

    async function getLotto() {
        try {
            const m = await (await fetch('https://brasilapi.com.br/api/loterias/mega-sena/latest')).json();
            document.getElementById('mega-concurso').innerText = "Conc. " + m.concurso;
            document.getElementById('mega-balls').innerHTML = m.dezenas.map(n => `<div class="ball mega">${n}</div>`).join('');

            const f = await (await fetch('https://brasilapi.com.br/api/loterias/lotofacil/latest')).json();
            document.getElementById('facil-concurso').innerText = "Conc. " + f.concurso;
            document.getElementById('facil-balls').innerHTML = f.dezenas.map(n => `<div class="ball facil">${n}</div>`).join('');
        } catch (e) { console.log("Erro lotto"); }
    }

    // Carrossel
    let currentSlide = 0;
    const slides = ['slide-news', 'slide-lotto'];
    function rotate() {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        currentSlide = (currentSlide + 1) % slides.length;
        document.getElementById(slides[currentSlide]).classList.add('active');
        if(currentSlide === 0) getNews();
        if(currentSlide === 1) getLotto();
    }

    // Início
    updateClock(); getClima(); getNews(); getLotto();
    setInterval(rotate, 15000); // 15 segundos cada slide
    setInterval(getClima, 600000); // Atualiza clima a cada 10 min
</script>

</body>
</html>
